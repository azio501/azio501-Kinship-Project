 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries Reset</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #ff4500; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; }
        
        #search-container { position: absolute; top: 40px; right: 40px; pointer-events: auto; }
        #medical-search {
            background: rgba(10, 0, 0, 0.9); border: 1px solid #ff4500; color: #ff4500;
            padding: 15px; width: 320px; outline: none; box-shadow: 0 0 20px rgba(255, 69, 0, 0.2);
            text-transform: uppercase; letter-spacing: 2px;
        }

        #sidebar { position: absolute; left: 45px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 30px; pointer-events: auto; }
        .icon { 
            width: 60px; height: 60px; border: 2px solid #ff4500; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(0, 0, 0, 0.9); color: #ff4500; font-size: 28px;
            cursor: pointer; transition: 0.3s;
        }
        .icon:hover { background: #ff4500; color: #000; box-shadow: 0 0 30px #ff4500; }
        #bottom-text { position: absolute; bottom: 50px; width: 100%; text-align: center; letter-spacing: 20px; font-size: 26px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="search-container"><input type="text" id="medical-search" placeholder="FLEXICON_QUERY_"></div>
        <div id="sidebar">
            <div class="icon">📖</div>
            <div class="icon">🔭</div>
            <div class="icon">♈</div>
            <div class="icon">⚙</div>
        </div>
        <div id="bottom-text">ARIES</div>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. CLEAN STARS
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(3000 * 3);
        for(let i=0; i<9000; i++) starPos[i] = (Math.random() - 0.5) * 800;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 1.5, sizeAttenuation: false, color: 0x888888, transparent: true, opacity: 0.5 }));
        scene.add(stars);

        // 2. THE STABLE ORB (Wireframe Etched Glass)
        const orbGroup = new THREE.Group();
        
        // Internal Grid (The "Etching")
        const grid = new THREE.Mesh(
            new THREE.SphereGeometry(4, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xff4500, wireframe: true, transparent: true, opacity: 0.1 })
        );
        orbGroup.add(grid);

        // The "Thin" Shell
        const shell = new THREE.Mesh(
            new THREE.SphereGeometry(4.05, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xff4500, transparent: true, opacity: 0.05 })
        );
        orbGroup.add(shell);

        // 3. THE CONSTELLATION
        const aNodes = [[-1.2, 1.5, 0.5], [0.3, 1.0, 1.2], [1.8, 0.2, 0.5], [1.3, -1.0, 0.1]];
        aNodes.forEach(p => {
            const n = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12, 12), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            n.position.set(...p);
            orbGroup.add(n);
        });

        scene.add(orbGroup);
        camera.position.z = 12;

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0001;
            orbGroup.rotation.y += 0.004;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
