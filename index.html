 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v41</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 12px; letter-spacing: 2px; z-index: 100; }
        
        .floating-word { 
            position: fixed; color: #ff3300; font-weight: bold; white-space: nowrap; 
            pointer-events: auto; text-shadow: 0 0 8px #ff0000; font-size: 20px; 
            z-index: 50; 
            animation: drift 20s linear infinite;
        }

        @keyframes drift {
            0% { transform: translate(0, 0); }
            50% { transform: translate(100px, 50px); }
            100% { transform: translate(0, 0); }
        }
        
        #ui-layer { 
            position: fixed; bottom: 10px; left: 0; width: 100%; 
            display: flex; justify-content: center; pointer-events: none; z-index: 10; 
        }
        #zodiac-name { 
            color: #ffaa00; font-size: 9px; letter-spacing: 50px; opacity: 0; 
            transition: opacity 5s; text-shadow: 0 0 5px #ff4500;
            text-align: center; text-indent: 50px;
        }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="ui-layer"><div id="zodiac-name">ARIES</div></div>

    <script>
        let zapCount = 0, ritualComplete = false;
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "REFERRALS", "FRONT DESK", "PRIOR AUTH", "bedpan"];
        
        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // Faster
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Simple Starfield
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(5000 * 3);
        for(let i=0; i<15000; i++) starPos[i] = (Math.random() - 0.5) * 2000;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starSystem = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1 }));
        scene.add(starSystem);

        // 3. The Central Orb (Bright & Visible)
        const orbGeo = new THREE.SphereGeometry(20, 32, 32);
        const orbMat = new THREE.MeshBasicMaterial({ color: 0xffcc00, wireframe: true, transparent: true, opacity: 0 });
        const orb = new THREE.Mesh(orbGeo, orbMat);
        scene.add(orb);

        camera.position.z = 100;

        function createWord() {
            if(ritualComplete) return;
            const word = document.createElement('div');
            word.className = 'floating-word';
            word.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            word.style.left = (Math.random() * 80) + "vw";
            word.style.top = (Math.random() * 80) + "vh";
            document.body.appendChild(word);

            word.onmouseover = () => {
                if(ritualComplete) return;
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                word.style.color = "white";
                setTimeout(() => word.remove(), 50);
                if(zapCount >= 30) startTheFlush();
            };
        }

        let spawnInt = setInterval(() => { if(!ritualComplete) createWord(); }, 800);

        function startTheFlush() {
            ritualComplete = true;
            clearInterval(spawnInt);
            document.querySelectorAll('.floating-word').forEach(w => {
                w.style.transition = "all 0.8s";
                w.style.left = "50vw"; w.style.top = "50vh";
                w.style.opacity = "0";
            });
            setTimeout(bigBang, 1000);
        }

        function bigBang() {
            document.querySelectorAll('.floating-word').forEach(w => w.remove());
            document.getElementById('counter').style.display = 'none';
            
            let frame = 0;
            const animateBang = () => {
                frame++;
                orbMat.opacity = Math.min(1, frame/100);
                orb.rotation.y += 0.02;
                orb.scale.set(frame/20, frame/20, frame/20);
                
                if(frame < 120) requestAnimationFrame(animateBang);
                else document.getElementById('zodiac-name').style.opacity = "1";
            };
            animateBang();
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            starSystem.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        renderLoop();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
