 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. THE UNIVERSE */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
            z-index: 1;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.8;
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0.5;
            background: 
                radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.4), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.3), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 30, 160, 0.3), transparent 55%);
            filter: blur(60px);
            animation: rotateNebula 180s linear infinite;
        }

        @keyframes rotateNebula { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 2. THE STAGE */
        .stage {
            position: relative;
            z-index: 100;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(26px, 6vw, 46px);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            white-space: nowrap; 
            margin: 0;
            position: relative;
            z-index: 10;
            /* REMOVED INITIAL BLUR */
            animation: welcomeSequence 9s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700;
            font-size: clamp(14px, 2.5vw, 22px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            position: absolute;
            width: 100%;
            left: 0;
            top: 60px;
            z-index: 999; /* ABSOLUTE FRONT */
            opacity: 0;
            animation: ascentSequence 9s ease-in-out forwards;
        }

        @keyframes welcomeSequence {
            0% { opacity: 1; transform: scale(1); text-shadow: 0 0 15px #FFD700; }
            20% { opacity: 0.3; text-shadow: none; }
            /* SECOND PULSE - SHARP GLOW */
            40% { opacity: 1; text-shadow: 0 0 25px #FFD700, 0 0 45px rgba(255, 215, 0, 0.6); }
            75% { opacity: 1; transform: translateY(0); filter: blur(0px); }
