 <style>
    /* 1. THE UNIVERSE: Deep space background */
    body, html {
        margin: 0;
        padding: 0;
        background: #000000;
        overflow: hidden;
    }

    .galaxy-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
        z-index: 1;
    }

    /* 2. THE STAGE: Centering everything */
    .kinship-stage {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        pointer-events: none;
    }

    .welcome-text {
        font-family: 'Georgia', serif;
        color: #ffffff;
        font-size: clamp(22px, 5vw, 38px); 
        text-transform: uppercase;
        letter-spacing: 0.35em;
        white-space: nowrap;
        margin: 0;
        opacity: 0;
        /* Animation lasts 8 seconds to allow for two distinct pulses */
        animation: doublePulseAndAscent 8s ease-in-out forwards;
    }

    .ascent-text {
        font-family: sans-serif;
        color: #FFD700; /* Golden Yellow */
        font-size: 11px;
        letter-spacing: 0.6em;
        margin-top: 20px;
        opacity: 0;
        animation: simpleFadeAndAscent 8s ease-in-out forwards;
    }

    /* 3. THE MOVEMENT LOGIC */
    @keyframes doublePulseAndAscent {
        /* PULSE ONE */
        0% { opacity: 0; transform: scale(0.95); }
        15% { opacity: 1; text-shadow: 0 0 30px #FFD700, 0 0 60px #FFA500; transform: scale(1); }
        30% { opacity: 0.3; text-shadow: 0 0 5px #FFD700; transform: scale(0.98); }

        /* PULSE TWO (Re-appearing) */
        45% { opacity: 1; text-shadow: 0 0 40px #FFD700, 0 0 80px #FFA500; transform: scale(1.02); }
        65% { opacity: 1; text-shadow: 0 0 10px #FFD700; transform: scale(1); }

        /* THE ASCENT (Disappearing Upward) */
        100% { 
            opacity: 0; 
            transform: translateY(-250px); 
            filter: blur(15px); 
        }
    }

    @keyframes simpleFadeAndAscent {
        0%, 10% { opacity: 0; }
        25% { opacity: 0.6; } /* Fades in during the first pulse */
        65% { opacity: 0.6; transform: translateY(0); }
        100% { 
            opacity: 0; 
            transform: translateY(-250px); 
            filter: blur(10px); 
        }
    }
</style>

<div class="galaxy-bg"></div>

<div class="kinship-stage">
    <h1 class="welcome-text">Welcome to Kinship</h1>
    <div class="ascent-text">A PERSONAL ASCENT</div>
</div>
