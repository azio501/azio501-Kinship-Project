 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* 1. THE UNIVERSE - NO OPACITY 0 START */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
            z-index: 1;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.7; /* Forced visible */
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0.4; /* Forced visible */
            background: 
                radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.4), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.3), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 30, 160, 0.3), transparent 55%);
            filter: blur(60px);
            animation: rotateNebula 180s linear infinite;
        }

        @keyframes rotateNebula { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 2. THE STAGE */
        .stage {
            position: relative;
            z-index: 100;
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            font-size: clamp(26px, 6vw, 46px);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            white-space: nowrap; 
            margin: 0;
            /* Starts visible, then fades out */
            animation: welcomeSequence 9s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700;
            font-size: clamp(14px, 2.5vw, 20px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            position: absolute;
            width: 100%;
            left: 0;
            top: 55px;
            z-index: 110;
            /* Delayed start but passes "in front" */
            animation: ascentSequence 9s ease-in-out forwards;
        }

        @keyframes welcomeSequence {
            0% { opacity: 1; transform: scale(1); }
            20% { opacity: 0.2; transform: scale(0.98); }
            40% { opacity: 1; text-shadow: 0 0 20px #FFD700; }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-300px); filter: blur(15px); }
        }

        @keyframes ascentSequence {
            0%, 35% { opacity: 0; transform: translateY(60px) scale(0.7); }
            55% { opacity: 1; transform: translateY(10px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-500px) scale(2); filter: blur(5px); }
        }

        /* 3. BUTTON */
        .btn-container {
            opacity: 0;
            margin-top: 50px;
            animation: fadeIn 2s ease-out 8s forwards;
        }

        .enter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 22px 85px;
            color: #fff;
            font-family: 'Georgia', serif;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            border-radius: 100px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="galaxy-bg">
        <div class="star" style="top: 10%; left: 20%; width: 2px; height: 2px;"></div>
        <div class="star" style="top: 30%; left: 80%; width: 1px; height: 1px;"></div>
        <div class="star" style="top: 70%; left: 15%; width: 3px; height: 3px;"></div>
        <div class="star" style="top: 20%; left: 50%; width: 2px; height: 2px;"></div>
        <div class="star" style="top: 80%; left: 60%; width: 1px; height: 1px;"></div>
        <div class="nebula"></div>
    </div>

    <div class="stage">
        <h1 class="welcome-text">Welcome to Kinship</h1>
        <div class="ascent-text">A Personal Ascent</div>
        
        <div class="btn-container">
            <button class="enter-btn" onclick="location.reload()">Enter</button>
        </div>
    </div>

</body>
</html>
