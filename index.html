 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries Reset v35</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 14px; letter-spacing: 2px; z-index: 10; }
        .floating-word { position: absolute; color: #ff3300; font-weight: bold; white-space: nowrap; pointer-events: auto; text-shadow: 0 0 10px #ff0000; }
        
        #ui-layer { 
            position: absolute; bottom: 12%; left: 0; width: 100%; 
            display: flex; justify-content: center; pointer-events: none; z-index: 5; 
        }
        #zodiac-name { 
            color: #ffaa00; font-size: 18px; letter-spacing: 40px; opacity: 0; 
            transition: opacity 4s; text-shadow: 0 0 15px #ff4500;
            text-align: center; margin-left: 40px; 
        }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="ui-layer"><div id="zodiac-name">ARIES</div></div>

    <script>
        let zapCount = 0, ritualComplete = false, activeWords = [];
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "ELEVATOR MUSIC", "REFERRALS", "FLAPPIN' GOWN", "BARIUM DRINK", "SUGAR", "CHAULKY", "FRONT DESK", "THEREPY", "PRIOR AUTH", "bedpan"];
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const starGeo = new THREE.BufferGeometry();
        const starCount = 20000;
        const pos = new Float32Array(starCount * 3);
        const vel = new Float32Array(starCount * 3);
        for(let i=0; i<starCount; i++) {
            pos[i*3] = (Math.random() - 0.5) * 20;
            pos[i*3+1] = (Math.random() - 0.5) * 20;
            pos[i*3+2] = (Math.random() - 0.5) * 20;
            vel[i*3] = pos[i*3] * 50;
            vel[i*3+1] = pos[i*3+1] * 50;
            vel[i*3+2] = pos[i*3+2] * 50;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0 });
        const starSystem = new THREE.Points(starGeo, starMat);
        scene.add(starSystem);

        // --- THE RECOVERY ORB ---
        const orbGroup = new THREE.Group();
        
        // Solid Glowing Core (To ensure visibility)
        const core = new THREE.Mesh(
            new THREE.SphereGeometry(10, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0 })
        );
        
        // Wireframe Shell
        const shell = new THREE.Mesh(
            new THREE.IcosahedronGeometry(10.5, 1),
            new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0 })
        );
        
        orbGroup.add(core);
        orbGroup.add(shell);
        orbGroup.position.z = -200; 
        orbGroup.scale.set(0.1, 0.1, 0.1);
        scene.add(orbGroup);

        camera.position.z = 100;

        function createWord() {
            if(ritualComplete) return;
            const word = document.createElement('div');
            word.className = 'floating-word';
            word.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            const depth = Math.random();
            word.style.left = Math.random() * window.innerWidth + "px";
            word.style.top = Math.random() * window.innerHeight + "px";
            document.body.appendChild(word);
            activeWords.push({ element: word, x: parseFloat(word.style.left), y: parseFloat(word.style.top), dx: (Math.random()-0.5)*10, dy: (Math.random()-0.5)*10, sucking: false });

            word.onmouseover = () => {
                if(ritualComplete) return;
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                if(zapCount === 30) startTheFlush();
                word.remove();
            };
        }

        setInterval(() => { if(!ritualComplete) createWord(); }, 600);

        function startTheFlush() {
            ritualComplete = true;
            activeWords.forEach(w => w.sucking = true);
            setTimeout(() => {
                let flushTimer = setInterval(() => {
                    activeWords.forEach((w, index) => {
                        const dX = (window.innerWidth/2) - w.x; const dY = (window.innerHeight/2) - w.y;
                        w.x += dX * 0.2; w.y += dY * 0.2;
                        w.element.style.left = w.x + "px"; w.element.style.top = w.y + "px";
                        if(Math.abs(dX) < 10) { w.element.remove(); activeWords.splice(index, 1); }
                    });
                    if(activeWords.length === 0) { clearInterval(flushTimer); bigBang(); }
                }, 16);
            }, 500);
        }

        function bigBang() {
            document.getElementById('counter').style.display = 'none';
            starMat.opacity = 1;
            const starPos = starSystem.geometry.attributes.position.array;
            let frame = 0;
            const explode = () => {
                frame++;
                for(let i=0; i<starCount; i++) {
                    starPos[i*3] += vel[i*3] * 0.05;
                    starPos[i*3+1] += vel[i*3+1] * 0.05;
                    starPos[i*3+2] += vel[i*3+2] * 0.05;
                }
                starSystem.geometry.attributes.position.needsUpdate = true;
                if(frame > 20 && orbGroup.position.z < 50) {
                    orbGroup.position.z += 4; 
                    const s = Math.min(4, orbGroup.scale.x * 1.15);
                    orbGroup.scale.set(s,s,s);
                    core.material.opacity = 0.8;
                    shell.material.opacity = 1;
                }
                if(frame < 200) requestAnimationFrame(explode);
                else document.getElementById('zodiac-name').style.opacity = "1";
            };
            explode();
        }

        function animate() {
            requestAnimationFrame(animate);
            orbGroup.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
