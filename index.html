 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v66 Static Orb</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        
        /* THE GALAXY */
        #starfield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001 0%, #000 100%);
            z-index: 1;
        }

        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-weight: bold; z-index: 100; letter-spacing: 2px; }

        .word {
            position: fixed; color: #ff0000; font-weight: 900; font-size: 30px;
            text-shadow: 0 0 15px #ff0000; cursor: pointer; user-select: none;
            z-index: 50; 
        }

        #blackout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; }

        /* THE ORB REVEAL - Trimmed (Cropped) into a Sphere */
        #final-reveal { 
            position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0);
            /* Standardizing size and shape */
            width: 500px; height: 500px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 1100;
            overflow: hidden; /* This is what "trims" the rectangle into a circle */
            box-shadow: 0 0 80px rgba(255,100,0,0.3);
        }

        #zodiac-img { 
            width: 100%; height: 100%; object-fit: cover; /* Forces image to fill the sphere */
            /* Removed spinning animation */
        }

        #zodiac-name {
            position: fixed; bottom: 80px; width: 100%; text-align: center;
            color: #ffaa00; font-size: 56px; letter-spacing: 75px; text-indent: 75px;
            opacity: 0; font-weight: bold; transition: opacity 3s; z-index: 1200;
        }

        .streak { position: absolute; background: #fff; width: 2px; height: 180px; z-index: 1050; }
    </style>
</head>
<body>

    <div id="starfield"></div>
    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="blackout"></div>
    
    <div id="final-reveal">
        <img id="zodiac-img" src="Glass%20Orb%20Aries%20copilot.png" alt="Aries Orb">
    </div>

    <div id="zodiac-name">ARIES</div>

    <script>
        let count = 0;
        let done = false;
        // Low constant speed
        const currentVelocity = 1.0; 
        const list = ["WAITING ROOMS", "INSURANCE", "COPAY", "PAPERWORK", "REFERRALS", "MEDICARE", "PRIOR AUTH", "CT scan"];
        let active = [];

        function spawn(x, y) {
            if(done) return;
            const el = document.createElement('div');
            el.className = 'word';
            el.innerText = list[Math.floor(Math.random() * list.length)];
            
            let sx = x ?? (Math.random() * 70 + 15);
            let sy = y ?? (Math.random() * 70 + 15);
            
            // Constant drift speed
            let dx = (Math.random() - 0.5) * currentVelocity;
            let dy = (Math.random() - 0.5) * currentVelocity;
            
            el.style.left = sx + 'vw'; el.style.top = sy + 'vh';
            document.body.appendChild(el);
            const obj = { el, x: sx, y: sy, dx, dy };

            el.onmouseover = () => {
                if(done) return;
                count++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${count}/30`;
                el.remove();
                active = active.filter(i => i !== obj);
                
                if(count < 30) {
                    // Slower build: 1 hit = 2 more words.
                    spawn(obj.x, obj.y); spawn(obj.x, obj.y);
                } else {
                    finishRitual();
                }
            };
            active.push(obj);
        }

        // Start with 2 words
        spawn(); spawn();

        function update() {
            if(!done) {
                active.forEach(o => {
                    o.x += o.dx; o.y += o.dy;
                    if(o.x < -15) o.x = 115; if(o.x > 115) o.x = -15;
                    if(o.y < -15) o.y = 115; if(o.y > 115) o.y = -15;
                    o.el.style.left = o.x + 'vw'; o.el.style.top = o.y + 'vh';
                });
            }
            requestAnimationFrame(update);
        }
        update();

        function finishRitual() {
            done = true;
            document.getElementById('blackout').style.display = 'block';
            active.forEach(o => o.el.remove());

            setTimeout(() => {
                document.getElementById('blackout').style.display = 'none';
                
                // THE BAM
                for(let i=0; i<80; i++) {
                    const s = document.createElement('div');
                    s.className = 'streak';
                    s.style.left = '50vw'; s.style.top = '50vh';
                    const angle = Math.random() * 360;
                    s.style.transform = `rotate(${angle}deg) translateY(0)`;
                    document.body.appendChild(s);
                    s.animate([
                        { transform: `rotate(${angle}deg) translateY(0)`, opacity: 1 },
                        { transform: `rotate(${angle}deg) translateY(1000px)`, opacity: 0 }
                    ], { duration: 700, easing: 'ease-out' });
                    setTimeout(() => s.remove(), 700);
                }

                document.getElementById('final-reveal').style.transform = 'translate(-50%, -50%) scale(1)';
                document.getElementById('zodiac-name').style.opacity = '1';
            }, 3000);
        }
    </script>
</body>
</html>
