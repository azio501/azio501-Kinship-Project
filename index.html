 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. THE UNIVERSE (Forced Visibility) */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
            z-index: 1;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3s infinite alternate;
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0.4;
            background: 
                radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.4), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.3), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 30, 160, 0.3), transparent 55%);
            filter: blur(60px);
            animation: rotateNebula 180s linear infinite;
        }

        @keyframes rotateNebula { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes twinkle { to { opacity: 1; transform: scale(1.4); } }

        /* 2. THE STAGE (Layered Depth) */
        .stage {
            position: relative;
            z-index: 100;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(26px, 6vw, 46px);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            white-space: nowrap; /* FORCES ONE LINE */
            margin: 0;
            opacity: 0;
            position: relative;
            z-index: 10; /* Lower Layer */
            animation: welcomePulseRise 9s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700;
            font-size: clamp(14px, 2.5vw, 22px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            position: absolute;
            width: 100%;
            text-align: center;
            top: 60px;
            opacity: 0;
            z-index: 999; /* STAYS IN FRONT */
            animation: ascentFastRise 9s ease-in-out forwards;
        }

        @keyframes welcomePulseRise {
            0% { opacity: 0; transform: scale(1); }
            15% { opacity: 1; text-shadow: 0 0 20px #FFD700, 0 0 40px #FFD700; }
            30% { opacity: 0.2; text-shadow: none; }
            45% { opacity: 1; text-shadow: 0 0 30px #FFD700, 0 0 50px rgba(255, 215, 0, 0.8); }
            75% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-350px); filter: blur(15px); }
        }

        @keyframes ascentFastRise {
            0%, 42% { opacity: 0; transform: translateY(100px) scale(0.6); }
            58% { opacity: 1; transform: translateY(20px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-600px) scale(3); filter: blur(5px); }
        }

        /* 3. BUTTON */
        .btn-container {
            opacity: 0;
            margin-top: 60px;
            z-index: 1000;
            animation: fadeIn 2s ease-out 8.5s forwards;
        }

        .enter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 20px 80px;
            color: #fff;
            font-family: 'Georgia', serif;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            border-radius: 100px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            transition: 0.4s;
        }
        
        .enter-btn:hover {
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            transform: scale(1.05);
            background: rgba(255, 215, 0, 0.1);
        }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="galaxy-bg" id="starfield">
        <div class="nebula"></div>
    </div>

    <div class="stage">
        <h1 class="welcome-text">Welcome to Kinship</h1>
        <div class="ascent-text">A Personal Ascent</div>
        
        <div class="btn-container">
            <button class="enter-btn" onclick="location.reload()">Enter</button>
        </div>
    </div>

    <script>
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px
