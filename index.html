 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v63 Fixed Physics</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; cursor: crosshair; }
        
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-family: 'Courier New', monospace; font-weight: bold; z-index: 100; }

        .word {
            position: fixed; color: #ff0000; font-weight: 900; font-size: 28px;
            text-shadow: 0 0 15px #ff0000; cursor: pointer; user-select: none;
            z-index: 50; transition: transform 0.1s;
        }

        #blackout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; }

        /* THE ORB WINDOW */
        #final-reveal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 450px; height: 450px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 1100; overflow: hidden;
            box-shadow: 0 0 100px rgba(255,100,0,0.4);
        }

        /* CLIPPING ARIES OUT OF GLASSORBSCORPIO.PNG */
        #zodiac-img { 
            position: absolute;
            width: 400%; /* Assuming a grid, adjust to zoom on Aries */
            height: auto;
            /* Adjust these percentages to move the "window" to the Aries Orb */
            left: 0%; top: 0%; 
            animation: orbFloat 4s ease-in-out infinite;
        }

        @keyframes orbFloat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .streak { position: absolute; background: #fff; width: 3px; height: 150px; z-index: 1050; }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="blackout"></div>
    
    <div id="final-reveal">
        <img id="zodiac-img" src="Glassorbscorpio.png" alt="Aries Orb">
    </div>

    <script>
        let count = 0;
        let done = false;
        const list = ["WAITING ROOMS", "INSURANCE", "COPAY", "PAPERWORK", "REFERRALS", "MEDICARE", "PRIOR AUTH", "CT scan"];
        let active = [];

        function spawn(x, y) {
            if(done) return;
            const el = document.createElement('div');
            el.className = 'word';
            el.innerText = list[Math.floor(Math.random() * list.length)];
            
            let sx = x ?? Math.random() * 80 + 10;
            let sy = y ?? Math.random() * 80 + 10;
            
            // GRADUAL SPEED: Speed increases as count goes from 0 to 30
            let currentBaseSpeed = 1 + (count * 0.15); 
            let dx = (Math.random() - 0.5) * currentBaseSpeed;
            let dy = (Math.random() - 0.5) * currentBaseSpeed;
            
            el.style.left = sx + 'vw'; el.style.top = sy + 'vh';
            document.body.appendChild(el);
            const obj = { el, x: sx, y: sy, dx, dy };

            el.onmouseover = () => {
                if(done) return;
                count++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${count}/30`;
                el.remove();
                active = active.filter(i => i !== obj);
                
                if(count < 30) {
                    // One hit = 4 new words. Slow build.
                    for(let i=0; i<4; i++) spawn(obj.x, obj.y);
                } else {
                    finishRitual();
                }
            };
            active.push(obj);
        }

        // Start with 2
        spawn(); spawn();

        function update() {
            if(!done) {
                active.forEach(o => {
                    o.x += o.dx * 0.2; o.y += o.dy * 0.2;
                    if(o.x < -15) o.x = 115; if(o.x > 115) o.x = -15;
                    if(o.y < -15) o.y = 115; if(o.y > 115) o.y = -15;
                    o.el.style.left = o.x + 'vw'; o.el.style.top = o.y + 'vh';
                });
            }
            requestAnimationFrame(update);
        }
        update();

        function finishRitual() {
            done = true;
            document.getElementById('blackout').style.display = 'block';
            active.forEach(o => o.el.remove());

            setTimeout(() => {
                document.getElementById('blackout').style.display = 'none';
                
                // THE BAM
                for(let i=0; i<60; i++) {
                    const s = document.createElement('div');
                    s.className = 'streak';
                    s.style.left = '50vw'; s.style.top = '50vh';
                    const angle = Math.random() * 360;
                    s.style.transform = `rotate(${angle}deg) translateY(0)`;
                    document.body.appendChild(s);
                    s.animate([
                        { transform: `rotate(${angle}deg) translateY(0)`, opacity: 1 },
                        { transform: `rotate(${angle}deg) translateY(1000px)`, opacity: 0 }
                    ], { duration: 800, easing: 'ease-out' });
                    setTimeout(() => s.remove(), 800);
                }

                document.getElementById('final-reveal').style.transform = 'translate(-50%, -50%) scale(1)';
            }, 3000);
        }
    </script>
</body>
</html>
