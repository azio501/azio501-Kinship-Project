 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship Backup - March 26</title>
    <style>
        /* 1. THE UNIVERSE - Deep space background */
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        .galaxy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            z-index: 1;
        }

        /* 2. THE STARS - Procedural starfield using box-shadow */
        .galaxy-bg::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 1px;
            height: 1px;
            background: transparent;
            box-shadow: 
                15vw 15vh 1px #fff, 35vw 45vh 2px #fff, 80vw 10vh 1px #fff,
                90vw 80vh 1px #fff, 12vw 75vh 2px #fff, 50vw 50vh 1px #fff,
                25vw 30vh 1px rgba(255,255,255,0.5), 75vw 65vh 1.5px rgba(255,255,255,0.8),
                40vw 12vh 1px #fff, 65vw 88vh 1px #fff, 8vw 52vh 2px #fff,
                20vw 80vh 1px #fff, 45vw 25vh 1px rgba(255,255,255,0.3),
                85vw 35vh 1px #fff, 95vw 5vh 2px #fff, 55vw 75vh 1px #fff;
            animation: twinkle 8s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }

        /* 3. COLORFUL NEBULA - Appears after text fades */
        .universe-nebula {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            opacity: 0;
            /* Overlapping gradients to simulate a colorful galaxy */
            background: 
                radial-gradient(circle at 20% 40%, rgba(49, 21, 102, 0.6), transparent 50%),
                radial-gradient(circle at 80% 60%, rgba(14, 76, 117, 0.5), transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(102, 16, 47, 0.4), transparent 60%);
            /* Fades in at 9 seconds (as text leaves) and takes 4 seconds to reach full opacity */
            animation: revealUniverse 4s ease-in-out 9s forwards;
        }

        @keyframes revealUniverse {
            to { opacity: 1; }
        }

        /* 4. THE STAGE - Centering the experience */
        .kinship-stage {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none; /* Let clicks pass through until the button appears */
        }

        /* 5. TEXT ANIMATIONS */
        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(24px, 6vw, 42px); 
            text-transform: uppercase;
            letter-spacing: 0.35em;
            white-space: nowrap;
            margin: 0;
            opacity: 0;
            position: absolute; /* Keep it centered while animating up */
            animation: doubleBreathAndRise 9s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700; 
            font-size: clamp(16px, 2.5vw, 22px);
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin-top: 80px; /* Offset below the welcome text */
            opacity: 0;
            position: absolute;
            animation: sharpAppearAndRise 9s ease-in-out forwards;
        }

        @keyframes doubleBreathAndRise {
            0% { opacity: 0; transform: scale(0.98); letter-spacing: 0.35em; }
            15% { opacity: 1; text-shadow: 0 0 15px #FFD700; transform: scale(1); }
            30% { opacity: 0.05; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            65% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-300px); filter: blur(4px); letter-spacing: 0.7em; }
        }

        @keyframes sharpAppearAndRise {
            0%, 38% { opacity: 0; transform: translateY(10px); }
            50% { opacity: 1; transform: translateY(0); }
            65% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-350px); letter-spacing: 0.9em; }
        }

        /* 6. ENTER BUTTON */
        .enter-btn-wrapper {
            position: absolute;
            opacity: 0;
            /* Button fades in at 11 seconds */
            animation: revealButton 2s ease-in-out 11s forwards;
            pointer-events: auto; /* Makes the button clickable */
        }

        .enter-button {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 16px 48px;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(4px);
        }

        .enter-button:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #FFD700;
            color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3), inset 0 0 10px rgba(255, 215, 0, 0.1);
            letter-spacing: 0.5em; /* Expands slightly on hover */
        }

        @keyframes revealButton {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="galaxy-bg"></div>
    <div class="universe-nebula"></div>

    <div class="kinship-stage">
        <h1 class="welcome-text">Welcome to Kinship</h1>
        <div class="ascent-text">A Personal Ascent</div>
        
        <div class="enter-btn-wrapper">
            <button class="enter-button" onclick="window.location.href='#'">Enter</button>
        </div>
    </div>

</body>
</html>
