 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        /* 1. THE UNIVERSE - Starts dark, blooms later */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #050510 0%, #000000 100%);
            z-index: 1;
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0; /* Hidden during the first part of the text intro */
            background: 
                radial-gradient(circle at 30% 30%, rgba(100, 60, 255, 0.7), transparent 45%),
                radial-gradient(circle at 70% 70%, rgba(0, 180, 255, 0.6), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 20, 150, 0.5), transparent 55%);
            filter: blur(60px);
            /* Starts blooming at 7 seconds as text ascends */
            animation: bloomUniverse 5s ease-in-out 7s forwards, rotateNebula 120s linear infinite;
        }

        @keyframes bloomUniverse {
            to { opacity: 0.7; }
        }

        @keyframes rotateNebula {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 2. THE STAGE - One line fix */
        .kinship-stage {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .text-container {
            text-align: center;
            white-space: nowrap; /* Forces Welcome to Kinship to stay on one line */
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(24px, 6vw, 42px); 
            text-transform: uppercase;
            letter-spacing: 0.35em;
            margin: 0;
            opacity: 0;
            animation: doubleBreathAndRise 9s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700; 
            font-size: clamp(16px, 2.5vw, 22px);
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin-top: 25px;
            opacity: 0;
            animation: sharpAppearAndRise 9s ease-in-out forwards;
        }

        /* 3. ORIGINAL ANIMATIONS */
        @keyframes doubleBreathAndRise {
            0% { opacity: 0; transform: scale(0.98); }
            15% { opacity: 1; text-shadow: 0 0 15px #FFD700; transform: scale(1); }
            30% { opacity: 0.05; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            65% { opacity: 1; transform: translateY(0); }
            100% { 
                opacity: 0; 
                transform: translateY(-300px); 
                filter: blur(8px); 
            }
        }

        @keyframes sharpAppearAndRise {
            0%, 38% { opacity: 0; transform: translateY(10px); }
            50% { opacity: 1; transform: translateY(0); }
            65% { opacity: 1; transform: translateY(0); }
            100% { 
                opacity: 0; 
                transform: translateY(-300px); 
            }
        }

        /* 4. SOFT GLOW PILL BUTTON */
        .btn-container {
            opacity: 0;
            margin-top: 50px;
            pointer-events: auto;
            /* Appears at 9s when text is gone and universe is visible */
            animation: revealButton 2s ease-out 9s forwards;
        }

        .enter-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 22px 80px;
            color: #ffffff;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            border-radius: 100px;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.5s ease;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
        }

        .enter-button:hover {
            border-color: #FFD700;
            color: #FFD700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
        }

        @keyframes revealButton {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="galaxy-bg">
        <div class="nebula"></div>
    </div>

    <div class="kinship-stage">
        <div class="text-container">
            <h1 class="welcome-text">Welcome to Kinship</h1>
            <div class="ascent-text">A Personal Ascent</div>
        </div>
        
        <div class="btn-container">
            <button class="enter-button" onclick="location.reload()">Enter</button>
        </div>
    </div>

</body>
</html>
