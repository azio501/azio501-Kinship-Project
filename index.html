 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v61 The Image Reveal</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; cursor: crosshair; }
        
        .word {
            position: fixed; color: #ff0000; font-weight: 900; font-size: 32px;
            text-shadow: 0 0 20px #ff0000; cursor: pointer; user-select: none;
            z-index: 50;
        }

        #blackout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; }

        /* THE REVEAL ORB */
        #final-reveal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 500px; height: 500px; border-radius: 50%; 
            /* Realistic Glass Overlay */
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, transparent 50%), #000;
            box-shadow: inset 0 0 80px #000, 0 0 100px rgba(255,100,0,0.3);
            display: flex; align-items: center; justify-content: center;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 1100; overflow: hidden;
        }

        /* YOUR COPILOT IMAGE GOES HERE */
        #zodiac-img { 
            width: 80%; height: 80%; object-fit: contain;
            animation: slowRotate 20s linear infinite;
        }

        @keyframes slowRotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .streak { position: absolute; background: #fff; width: 3px; height: 150px; z-index: 1050; }
    </style>
</head>
<body>

    <div id="blackout"></div>
    
    <div id="final-reveal">
        <img id="zodiac-img" src="aries.png" alt="Aries Symbol">
    </div>

    <script>
        let count = 0;
        let done = false;
        const list = ["WAITING ROOMS", "INSURANCE", "COPAY", "PAPERWORK", "REFERRALS", "MEDICARE", "PRIOR AUTH", "CT scan", "DEDUCTIBLE"];
        let active = [];

        function spawn(x, y, isBlast = false) {
            if(done) return;
            const el = document.createElement('div');
            el.className = 'word';
            el.innerText = list[Math.floor(Math.random() * list.length)];
            
            let sx = x ?? Math.random() * 90;
            let sy = y ?? Math.random() * 90;
            // High velocity blast speed
            let speed = isBlast ? 6 : 1.5;
            let dx = (Math.random() - 0.5) * speed;
            let dy = (Math.random() - 0.5) * speed;
            
            el.style.left = sx + 'vw'; el.style.top = sy + 'vh';
            document.body.appendChild(el);
            const obj = { el, x: sx, y: sy, dx, dy };

            el.onmouseover = () => {
                if(done) return;
                count++;
                el.remove();
                active = active.filter(i => i !== obj);
                
                if(count < 30) {
                    // THE CHAIN REACTION: 20 words explode out
                    for(let i=0; i<20; i++) spawn(obj.x, obj.y, true);
                } else {
                    triggerEnd();
                }
            };
            active.push(obj);
        }

        spawn(); spawn();

        function update() {
            if(!done) {
                active.forEach(o => {
                    o.x += o.dx * 0.15; o.y += o.dy * 0.15;
                    if(o.x < -20) o.x = 120; if(o.x > 120) o.x = -20;
                    if(o.y < -20) o.y = 120; if(o.y > 120) o.y = -20;
                    o.el.style.left = o.x + 'vw'; o.el.style.top = o.y + 'vh';
                });
            }
            requestAnimationFrame(update);
        }
        update();

        function triggerEnd() {
            done = true;
            document.getElementById('blackout').style.display = 'block';
            active.forEach(o => o.el.remove());

            // 3 SECONDS OF VOID
            setTimeout(() => {
                document.getElementById('blackout').style.display = 'none';
                
                // THE BAM EXPLOSION
                for(let i=0; i<80; i++) {
                    const s = document.createElement('div');
                    s.className = 'streak';
                    s.style.left = '50vw'; s.style.top = '50vh';
                    const angle = Math.random() * 360;
                    s.style.transform = `rotate(${angle}deg) translateY(0)`;
                    document.body.appendChild(s);
                    s.animate([
                        { transform: `rotate(${angle}deg) translateY(0)`, opacity: 1 },
                        { transform: `rotate(${angle}deg) translateY(1000px)`, opacity: 0 }
                    ], { duration: 700, easing: 'ease-out' });
                    setTimeout(() => s.remove(), 700);
                }

                // SHOW THE FINAL IMAGE
                document.getElementById('final-reveal').style.transform = 'translate(-50%, -50%) scale(1)';
            }, 3000);
        }
    </script>
</body>
</html>
