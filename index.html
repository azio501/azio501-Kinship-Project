 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v43 Eclipse</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 12px; letter-spacing: 2px; z-index: 100; }

        /* THE RED WORDS */
        .word {
            position: fixed;
            color: #ff3300;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 0 10px #ff0000;
            font-size: 20px;
            z-index: 50;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
        }

        /* THE HEAVY GLASS ORB */
        #orb {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 350px;
            height: 350px;
            border-radius: 50%;
            /* Layered shadows create the "Thickness" */
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, #333 10%, #000 80%);
            box-shadow: 
                inset -20px -20px 50px rgba(255,140,0,0.3), 
                inset 10px 10px 30px rgba(255,255,255,0.4),
                0 0 80px rgba(255,69,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* The Polished Shine (Inner Glint) */
        #shine {
            position: absolute;
            top: 15%;
            left: 20%;
            width: 80px;
            height: 40px;
            background: rgba(255,255,255,0.4);
            filter: blur(15px);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        /* ARIES WHISPER */
        #zodiac-name {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #cc8800;
            font-size: 10px;
            letter-spacing: 45px;
            text-indent: 45px;
            opacity: 0;
            transition: opacity 4s;
        }

    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    
    <div id="orb">
        <div id="shine"></div>
    </div>

    <div id="zodiac-name">ARIES</div>

    <script>
        let zapCount = 0;
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "REFERRALS", "FRONT DESK", "PRIOR AUTH", "bedpan"];
        const activeWords = [];

        function spawn() {
            if(zapCount >= 30) return;
            const w = document.createElement('div');
            w.className = 'word';
            w.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            
            // Random positions
            let x = Math.random() * 90;
            let y = Math.random() * 90;
            let speed = 1 + Math.random() * 3;
            
            w.style.left = x + 'vw';
            w.style.top = y + 'vh';
            document.body.appendChild(w);

            const entry = { el: w, x, y, speed };
            activeWords.push(entry);

            w.onmouseover = () => {
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                w.style.opacity = '0';
                setTimeout(() => w.remove(), 200);
                if(zapCount === 30) finish();
            };
        }

        // Movement loop (Horizontal Drift)
        setInterval(() => {
            activeWords.forEach(obj => {
                obj.x += 0.1 * obj.speed;
                if(obj.x > 100) obj.x = -10;
                obj.el.style.left = obj.x + 'vw';
            });
        }, 20);

        setInterval(spawn, 700);

        function finish() {
            document.getElementById('counter').style.display = 'none';
            document.querySelectorAll('.word').forEach(w => w.remove());
            
            const orb = document.getElementById('orb');
            orb.style.transform = 'translate(-50%, -50%) scale(1)';
            
            setTimeout(() => {
                document.getElementById('zodiac-name').style.opacity = '1';
            }, 2000);
        }
    </script>
</body>
</html>
