 <style>
    /* 1. THE UNIVERSE: Bringing back the dark galaxy */
    body, html {
        margin: 0;
        padding: 0;
        background: #020205; /* Deep space black */
        overflow: hidden;
    }

    .galaxy-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
        z-index: 1;
    }

    /* Twinkling Stars effect */
    .galaxy-bg::after {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: 
            radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
            radial-gradient(1px 1px at 150px 50px, #fff, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 100px 150px, #ddd, rgba(0,0,0,0));
        background-size: 200px 200px;
        opacity: 0.3;
    }

    /* 2. THE TEXT CONTAINER */
    .kinship-stage {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        pointer-events: none;
    }

    .welcome-text {
        font-family: 'Georgia', serif;
        color: #ffffff;
        font-size: clamp(22px, 5vw, 40px); /* Adjusts to fit one line */
        text-transform: uppercase;
        letter-spacing: 0.3em;
        white-space: nowrap; /* Forces one line */
        margin: 0;
        opacity: 0;
        animation: doublePulse 5s ease-in-out forwards;
    }

    .ascent-text {
        font-family: sans-serif;
        color: #FFD700; /* Golden yellow */
        font-size: 12px;
        letter-spacing: 0.5em;
        margin-top: 20px;
        opacity: 0;
        animation: fadeInAndRise 5s ease-in-out forwards;
    }

    /* 3. THE MOVEMENT */
    @keyframes doublePulse {
        /* Start & Pulse 1 */
        0% { opacity: 0; transform: scale(1); }
        15% { opacity: 1; text-shadow: 0 0 30px #FFD700, 0 0 60px #FFA500; transform: scale(1.05); }
        30% { text-shadow: 0 0 10px #FFD700; transform: scale(1); }
        
        /* Pulse 2 */
        45% { opacity: 1; text-shadow: 0 0 40px #FFD700, 0 0 80px #FFA500; transform: scale(1.05); }
        60% { text-shadow: 0 0 10px #FFD700; transform: scale(1); opacity: 1; }

        /* The Final Ascent */
        100% { opacity: 0; transform: translateY(-200px); filter: blur(10px); }
    }

    @keyframes fadeInAndRise {
        0% { opacity: 0; }
        20% { opacity: 0.7; } /* Appears while Welcome is pulsing */
        60% { opacity: 0.7; transform: translateY(0); }
        /* Joins the ascent */
        100% { opacity: 0; transform: translateY(-200px); filter: blur(10px); }
    }
</style>

<div class="galaxy-bg"></div>

<div class="kinship-stage">
    <h1 class="welcome-text">Welcome to Kinship</h1>
    <div class="ascent-text">A PERSONAL ASCENT</div>
</div>
