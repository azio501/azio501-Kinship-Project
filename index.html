 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        /* 1. STABLE FOUNDATION */
        body, html {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. THE UNIVERSE (Instant visibility) */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            /* Faint blue glow so it's never pitch black */
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3s infinite alternate;
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0.3; /* visible from second zero */
            background: 
                radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.4), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.3), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 30, 160, 0.2), transparent 55%);
            filter: blur(60px);
            animation: bloomFull 6s ease-in-out 6s forwards, rotateNebula 180s linear infinite;
        }

        @keyframes bloomFull { to { opacity: 0.8; } }
        @keyframes rotateNebula { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes twinkle { to { opacity: 1; transform: scale(1.3); } }

        /* 3. TEXT & DEPTH */
        .stage {
            position: relative;
            z-index: 100;
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #fff;
            font-size: clamp(26px, 6vw, 46px);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            white-space: nowrap; /* Forces one line */
            margin: 0;
            opacity: 0;
            z-index: 101;
            animation: welcomePulseRise 8s ease-in-out 0.5s forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700;
            font-size: clamp(14px, 2.5vw, 20px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            position: absolute;
            width: 100%;
            left: 0;
            top: 50px;
            opacity: 0;
            z-index: 110; /* Passes "In Front" */
            animation: ascentFastRise 8s ease-in-out 0.5s forwards;
        }

        @keyframes welcomePulseRise {
            0% { opacity: 0; transform: scale(0.95); }
            15% { opacity: 1; text-shadow: 0 0 15px #FFD700; transform: scale(1); }
            30% { opacity: 0.1; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            65% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-300px); filter: blur(12px); }
        }

        @keyframes ascentFastRise {
            0%, 45% { opacity: 0; transform: translateY(60px) scale(0.7); }
            60% { opacity: 1; transform: translateY(20px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-500px) scale(1.8); filter: blur(4px); }
        }

        /* 4. THE SHIMMERING PILL BUTTON */
        .btn-container {
            opacity: 0;
            margin-top: 40px;
            animation: showBtn 2s ease-out 7.5s forwards;
        }
