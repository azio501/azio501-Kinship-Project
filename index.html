 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v67 Deep Space</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-weight: bold; z-index: 100; letter-spacing: 2px; }

        .word {
            position: fixed; color: #ff0000; font-weight: 900; font-size: 30px;
            text-shadow: 0 0 15px #ff0000; cursor: pointer; user-select: none;
            z-index: 50; 
        }

        #blackout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; }

        /* THE ORB - Blended into the Universe */
        #final-reveal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 80vh; height: 80vh; /* Scaled to the screen height */
            display: flex; align-items: center; justify-content: center;
            transition: transform 2s ease-out; 
            z-index: 1100;
        }

        #zodiac-img { 
            width: 100%; height: 100%; object-fit: contain;
            /* This blur/shadow blends the square edges into the black background */
            filter: drop-shadow(0 0 40px #000) contrast(1.1);
            border-radius: 50%;
        }

        #zodiac-name {
            position: fixed; bottom: 5vh; width: 100%; text-align: center;
            color: #ffaa00; font-size: 6vw; letter-spacing: 5vw; text-indent: 5vw;
            opacity: 0; font-weight: bold; transition: opacity 4s; z-index: 1200;
        }

        .streak { position: absolute; background: #fff; width: 2px; height: 250px; z-index: 1050; }
    </style>
</head>
<body>

    <div id="counter">SYSTEM_CLEANSE: 0/30</div>
    <div id="blackout"></div>
    
    <div id="final-reveal">
        <img id="zodiac-img" src="Glass%20Orb%20Aries%20copilot.png" alt="Aries Orb">
    </div>

    <div id="zodiac-name">ARIES</div>

    <script>
        let count = 0;
        let done = false;
        const list = ["WAITING ROOMS", "INSURANCE", "COPAY", "PAPERWORK", "REFERRALS", "MEDICARE", "PRIOR AUTH", "PET SCAN"];
        let active = [];

        function spawn() {
            if(done) return;
            const el = document.createElement('div');
            el.className = 'word';
            el.innerText = list[Math.floor(Math.random() * list.length)];
            
            // Spawn them around the edges so they drift IN
            const side = Math.floor(Math.random() * 4);
            let sx, sy;
            if(side === 0) { sx = -10; sy = Math.random() * 100; }
            else if(side === 1) { sx = 110; sy = Math.random() * 100; }
            else if(side === 2) { sx = Math.random() * 100; sy = -10; }
            else { sx = Math.random() * 100; sy = 110; }
            
            // Drift towards the center
            let dx = (50 - sx) * 0.02;
            let dy = (50 - sy) * 0.02;
            
            el.style.left = sx + 'vw'; el.style.top = sy + 'vh';
            document.body.appendChild(el);
            const obj = { el, x: sx, y: sy, dx, dy };

            el.onmouseover = () => {
                if(done) return;
                count++;
                document.getElementById('counter').innerText = `SYSTEM_CLEANSE: ${count}/30`;
                el.style.transform = "scale(0)";
                setTimeout(() => el.remove(), 100);
                active = active.filter(i => i !== obj);
                
                if(count < 30) {
                    for(let i=0; i<3; i++) spawn();
                } else {
                    executeReveal();
                }
            };
            active.push(obj);
        }

        // Start the swarm
        for(let i=0; i<5; i++) spawn();

        function update() {
            if(!done) {
                active.forEach(o => {
                    o.x += o.dx; o.y += o.dy;
                    o.el.style.left = o.x + 'vw'; o.el.style.top = o.y + 'vh';
                    // If they reach center, they bounce back out
                    if(Math.abs(o.x - 50) < 5 && Math.abs(o.y - 50) < 5) {
                        o.dx *= -1.5; o.dy *= -1.5;
                    }
                });
                if(active.length < 10) spawn();
            }
            requestAnimationFrame(update);
        }
        update();

        function executeReveal() {
            done = true;
            document.getElementById('blackout').style.display = 'block';
            active.forEach(o => o.el.remove());

            setTimeout(() => {
                document.getElementById('blackout').style.display = 'none';
                
                // THE BAM - Pure Light
                for(let i=0; i<100; i++) {
                    const s = document.createElement('div');
                    s.className = 'streak';
                    s.style.left = '50vw'; s.style.top = '50vh';
                    const angle = Math.random() * 360;
                    s.style.transform = `rotate(${angle}deg) translateY(0)`;
                    document.body.appendChild(s);
                    s.animate([
                        { transform: `rotate(${angle}deg) translateY(0)`, opacity: 1 },
                        { transform: `rotate(${angle}deg) translateY(1200px)`, opacity: 0 }
                    ], { duration: 600, easing: 'ease-out' });
                    setTimeout(() => s.remove(), 600);
                }

                document.getElementById('final-reveal').style.transform = 'translate(-50%, -50%) scale(1)';
                document.getElementById('zodiac-name').style.opacity = '1';
            }, 3000);
        }
    </script>
</body>
</html>
