 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. BRIGHTER UNIVERSE */
        .universe-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #1a1a3a 0%, #000 100%);
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(100, 50, 255, 0.6), transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(0, 200, 255, 0.5), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 20, 140, 0.4), transparent 50%);
            filter: blur(60px);
            opacity: 0.4;
            animation: breatheUniverse 10s infinite ease-in-out alternate;
        }

        @keyframes breatheUniverse {
            from { opacity: 0.4; transform: scale(1); }
            to { opacity: 0.8; transform: scale(1.1) rotate(2deg); }
        }

        /* 2. THE STAGE (Stacked Layout) */
        .stage {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column; /* This keeps lines separate */
            align-items: center;
            text-align: center;
            width: 90%;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #fff;
            font-size: clamp(26px, 6vw, 50px);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            margin: 0;
            opacity: 0;
            /* Added a constant pulse to the glow */
            animation: 
                introFade 8s ease-in-out forwards,
                textPulse 4s infinite ease-in-out;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700;
            font-size: clamp(14px, 2.5vw, 20px);
            text-transform: uppercase;
            letter-spacing: 0.6em;
            margin-top: 20px;
            opacity: 0;
            animation: 
                introFadeSub 8s ease-in-out forwards,
                textPulse 4s infinite ease-in-out 1s;
        }

        @keyframes introFade {
            0% { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            20% { opacity: 1; filter: blur(0px); }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); filter: blur(20px); }
        }

        @keyframes introFadeSub {
            0%, 25% { opacity: 0; transform: translateY(20px); }
            45% { opacity: 1; }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); filter: blur(10px); }
        }

        @keyframes textPulse {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
            50% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
        }

        /* 3. SHINY GLOW PILL BUTTON */
        .btn-wrapper {
            opacity: 0;
            margin-top: 60px;
            animation: showBtn 2s ease-out 7s forwards;
        }

        .enter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 22px 80px;
            color: #fff;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            border-radius: 100px; /* Pill Shape */
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.5s ease;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            animation: btnHeartbeat 3s infinite ease-in-out;
        }

        .enter-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #FFD700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
        }

        @keyframes showBtn {
            to { opacity: 1; }
        }

        @keyframes btnHeartbeat {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
            50% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.4); border-color: rgba(255, 215, 0, 0.8); }
        }
    </style>
</head>
<body>

    <div class="universe-bg">
        <div class="nebula"></div>
    </div>

    <div class="stage">
        <h1 class="welcome-text">Welcome to Kinship</h1>
        <p class="ascent-text">A Personal Ascent</p>
        
        <div class="btn-wrapper">
            <button class="enter-btn" onclick="location.reload()">Enter</button>
        </div>
    </div>

</body>
</html>
