 <style>
    /* THE STAGE: Force centering and visibility */
    .kinship-base-layer {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        z-index: 99999 !important; /* Sitting on top of everything */
        background: transparent !important;
        pointer-events: none;
    }

    .kinship-title {
        font-family: 'Georgia', serif !important;
        color: #FFFFFF !important;
        /* Smaller font to fit one line */
        font-size: 28px !important; 
        text-transform: uppercase !important;
        letter-spacing: 0.25em !important;
        margin: 0 !important;
        opacity: 0;
        white-space: nowrap !important;
        /* The Breathing & Ascent Animation */
        animation: yellowAscent 7s ease-in-out forwards !important;
    }

    .kinship-sub {
        font-family: 'Arial', sans-serif !important;
        color: rgba(255, 255, 255, 0.5) !important;
        font-size: 12px !important;
        letter-spacing: 0.5em !important;
        margin-top: 15px !important;
        opacity: 0;
        animation: fadeInOnly 2s ease-in forwards 1s !important;
    }

    @keyframes yellowAscent {
        /* Pulse 1: Yellow/Gold */
        15%, 30% { 
            opacity: 1;
            text-shadow: 0 0 20px #FFD700, 0 0 40px #FFA500 !important;
            transform: scale(1.03);
        }
        40% { 
            text-shadow: 0 0 5px #FFD700 !important;
            transform: scale(1);
        }

        /* Pulse 2: Yellow/Gold */
        50%, 65% { 
            text-shadow: 0 0 30px #FFD700, 0 0 50px #FFA500 !important;
            transform: scale(1.03);
            opacity: 1;
        }

        /* The Ascent: Float Up and Dissolve */
        100% {
            opacity: 0;
            transform: translateY(-180px) !important;
            filter: blur(10px);
        }
    }

    @keyframes fadeInOnly {
        to { opacity: 1; }
    }
</style>

<div class="kinship-base-layer">
    <h1 class="kinship-title">Welcome to Kinship</h1>
    <div class="kinship-sub">A PERSONAL ASCENT</div>
</div>
