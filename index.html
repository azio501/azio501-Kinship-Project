 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries Kinetic v38</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 12px; letter-spacing: 2px; z-index: 10; }
        .floating-word { position: absolute; color: #ff3300; font-weight: bold; white-space: nowrap; pointer-events: auto; text-shadow: 0 0 8px #ff0000; font-size: 20px; }
        
        #ui-layer { 
            position: absolute; bottom: 5%; left: 0; width: 100%; 
            display: flex; justify-content: center; pointer-events: none; z-index: 5; 
        }
        #zodiac-name { 
            color: #ffaa00; font-size: 10px; letter-spacing: 40px; opacity: 0; 
            transition: opacity 4s; text-shadow: 0 0 5px #ff4500;
            text-align: center; text-indent: 40px;
        }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="ui-layer"><div id="zodiac-name">ARIES</div></div>

    <script>
        let zapCount = 0, ritualComplete = false, activeWords = [];
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "REFERRALS", "FLAPPIN' GOWN", "BARIUM DRINK", "FRONT DESK", "PRIOR AUTH", "bedpan"];
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Star Field
        const starGeo = new THREE.BufferGeometry();
        const starCount = 20000;
        const pos = new Float32Array(starCount * 3);
        const vel = new Float32Array(starCount * 3);
        for(let i=0; i<starCount; i++) {
            pos[i*3] = (Math.random() - 0.5) * 25;
            pos[i*3+1] = (Math.random() - 0.5) * 25;
            pos[i*3+2] = (Math.random() - 0.5) * 25;
            vel[i*3] = pos[i*3] * 70;
            vel[i*3+1] = pos[i*3+1] * 70;
            vel[i*3+2] = pos[i*3+2] * 70;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.03, color: 0xffffff, transparent: true, opacity: 0 });
        const starSystem = new THREE.Points(starGeo, starMat);
        scene.add(starSystem);

        // --- ORB ---
        const orbGroup = new THREE.Group();
        const glass = new THREE.Mesh(
            new THREE.SphereGeometry(10, 64, 64),
            new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.05, transparent: true, opacity: 0 })
        );
        const heart = new THREE.Mesh(
            new THREE.IcosahedronGeometry(6, 1),
            new THREE.MeshBasicMaterial({ color: 0xffaa00, wireframe: true, transparent: true, opacity: 0 })
        );
        const shine = new THREE.Mesh(
            new THREE.SphereGeometry(10.1, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, side: THREE.BackSide })
        );
        orbGroup.add(glass, heart, shine);
        orbGroup.position.z = -350; 
        orbGroup.scale.set(0.1, 0.1, 0.1);
        scene.add(orbGroup);

        scene.add(new THREE.PointLight(0xffffff, 8, 1000).set(60, 60, 100));
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        camera.position.z = 100;

        function createWord() {
            if(ritualComplete) return;
            const word = document.createElement('div');
            word.className = 'floating-word';
            word.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            
            let x, y, dx, dy;
            const side = Math.floor(Math.random() * 4);
            if(side === 0) { x = -250; y = Math.random()*window.innerHeight; dx = 3+Math.random()*5; dy = (Math.random()-0.5)*3; }
            else if(side === 1) { x = window.innerWidth+250; y = Math.random()*window.innerHeight; dx = -3-Math.random()*5; dy = (Math.random()-0.5)*3; }
            else if(side === 2) { x = Math.random()*window.innerWidth; y = -100; dx = (Math.random()-0.5)*3; dy = 3+Math.random()*5; }
            else { x = Math.random()*window.innerWidth; y = window.innerHeight+100; dx = (Math.random()-0.5)*3; dy = -3-Math.random()*5; }

            word.style.left = x + "px";
            word.style.top = y + "px";
            document.body.appendChild(word);
            
            const wordObj = { element: word, x, y, dx, dy };
            activeWords.push(wordObj);

            word.onmouseover = () => {
                if(ritualComplete) return;
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                word.innerHTML = "⚡";
                setTimeout(() => {
                    word.remove();
                    activeWords = activeWords.filter(w => w !== wordObj);
                }, 100);
                if(zapCount >= 30) startTheFlush();
            };
        }

        let spawnInt = setInterval(() => { if(!ritualComplete) createWord(); }, 700);

        function startTheFlush() {
            ritualComplete = true;
            clearInterval(spawnInt);
            setTimeout(() => {
                let flushTimer = setInterval(() => {
                    activeWords.forEach((w) => {
                        const dX = (window.innerWidth/2) - w.x; const dY = (window.innerHeight/2) - w.y;
                        w.x += dX * 0.15; w.y += dY * 0.15;
                        w.element.style.left = w.x + "px"; w.element.style.top = w.y + "px";
                        w.element.style.opacity = Math.abs(dX)/500;
                        if(Math.abs(dX) < 20) w.element.remove();
                    });
                    if(document.querySelectorAll('.floating-word').length === 0) { 
                        clearInterval(flushTimer); 
                        bigBang(); 
                    }
                }, 16);
            }, 300);
        }

        function bigBang() {
            document.getElementById('counter').style.display = 'none';
            starMat.opacity = 1;
            const starPos = starSystem.geometry.attributes.position.array;
            let frame = 0;
            const explode = () => {
                frame++;
                for(let i=0; i<starCount; i++) {
                    starPos[i*3] += vel[i*3] * 0.08;
                    starPos[i*3+1] += vel[i*3+1] * 0.08;
                    starPos[i*3+2] += vel[i*3+2] * 0.08;
                }
                starSystem.geometry.attributes.position.needsUpdate = true;
                if(frame > 20 && orbGroup.position.z < 40) {
                    orbGroup.position.z += 10; 
                    const s = Math.min(4.5, orbGroup.scale.x * 1.3);
                    orbGroup.scale.set(s,s,s);
                    glass.material.opacity = 0.6; heart.material.opacity = 1; shine.material.opacity = 0.4;
                }
                if(frame < 250) requestAnimationFrame(explode);
                else document.getElementById('zodiac-name').style.opacity = "1";
            };
            explode();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!ritualComplete) {
                activeWords.forEach(w => {
                    w.x += w.dx; w.y += w.dy;
                    w.element.style.left = w.x + "px"; w.element.style.top = w.y + "px";
                    // Screen Wrap
                    if(w.x < -300) w.x = window.innerWidth + 200;
                    if(w.x > window.innerWidth + 300) w.x = -200;
                    if(w.y < -300) w.y = window.innerHeight + 200;
                    if(w.y > window.innerHeight + 300) w.y = -200;
                });
            }
            orbGroup.rotation.y += 0.005;
            heart.rotation.x += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
