 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v55 The Final Genesis</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 14px; letter-spacing: 2px; z-index: 100; }

        .word {
            position: fixed; color: #ff2200; font-weight: 900; white-space: nowrap;
            text-shadow: 0 0 15px #ff0000; font-size: 26px; z-index: 50;
            cursor: pointer; user-select: none;
        }

        /* THE NEW GALAXY ORB */
        #orb {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 480px; height: 480px; border-radius: 50%;
            /* Deep Space Interior */
            background: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, transparent 40%),
                radial-gradient(circle at 60% 60%, rgba(75,0,130,0.3) 0%, transparent 60%),
                #000;
            box-shadow: inset 0 0 80px rgba(255,140,0,0.2), 0 0 120px rgba(255,69,0,0.4);
            display: flex; align-items: center; justify-content: center;
            z-index: 60; transition: transform 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            perspective: 1000px;
        }

        #symbol { 
            font-size: 160px; color: #ffaa00; 
            text-shadow: 0 0 30px #ff4500;
            transform-style: preserve-3d;
            animation: slowRotate 15s linear infinite;
        }

        @keyframes slowRotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        #zodiac-name {
            position: fixed; bottom: 60px; width: 100%; text-align: center;
            color: #ffaa00; font-size: 48px; letter-spacing: 75px; text-indent: 75px;
            opacity: 0; font-weight: bold; transition: opacity 5s; z-index: 70;
        }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="orb"><div id="symbol">♈</div></div>
    <div id="zodiac-name">ARIES</div>

    <script>
        let zapCount = 0;
        let ritualComplete = false;
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "REFERRALS", "FRONT DESK", "PRIOR AUTH", "DEDUCTIBLE"];
        let activeWords = [];

        function spawn(x, y, isBlast = false) {
            if(ritualComplete) return;
            const w = document.createElement('div');
            w.className = 'word';
            w.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            
            let startX = x ?? (Math.random() * 80 + 10);
            let startY = y ?? (Math.random() * 80 + 10);
            
            let speed = isBlast ? 3 : 0.6;
            let dx = (Math.random() - 0.5) * speed;
            let dy = (Math.random() - 0.5) * speed;
            
            w.style.left = startX + 'vw'; w.style.top = startY + 'vh';
            document.body.appendChild(w);
            const obj = { el: w, x: startX, y: startY, dx, dy };

            w.onmouseover = () => {
                if(ritualComplete) return;
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                w.remove();
                activeWords = activeWords.filter(item => item !== obj);

                if(zapCount < 30) {
                    // This is what creates the "Blasting through chunks" feel
                    for(let i=0; i<5; i++) spawn(obj.x, obj.y, true);
                } else {
                    finishRitual();
                }
            };
            activeWords.push(obj);
        }

        // START QUIET: Just 2 words
        spawn(); spawn();

        function update() {
            if(!ritualComplete) {
                activeWords.forEach(obj => {
                    obj.x += obj.dx; obj.y += obj.dy;
                    if(obj.x < -20 || obj.x > 120 || obj.y < -20 || obj.y > 120) {
                        obj.el.remove();
                        activeWords = activeWords.filter(i => i !== obj);
                        if(activeWords.length < 2) spawn(); 
                    }
                    obj.el.style.left = obj.x + 'vw'; obj.el.style.top = obj.y + 'vh';
                });
            }
            requestAnimationFrame(update);
        }
        update();

        function finishRitual() {
            ritualComplete = true;
            document.getElementById('counter').style.display = 'none';
            
            // 1. SUCK INTO CENTER
            activeWords.forEach(obj => {
                obj.el.style.transition = "all 0.8s ease-in";
                obj.el.style.left = "50vw"; obj.el.style.top = "50vh";
                obj.el.style.opacity = "0";
            });

            // 2. THE 3-SECOND BLACKOUT
            setTimeout(() => {
                activeWords.forEach(obj => obj.el.remove());
                
                // 3. THE BAM (Stars & Stripes)
                for(let i=0; i<80; i++) {
                    const s = document.createElement('div');
                    s.style.position = 'fixed'; s.style.left = '50vw'; s.style.top = '50vh';
                    s.style.width = '2px'; s.style.height = '100px'; s.style.background = '#fff';
                    const angle = Math.random() * 360;
                    s.style.transform = `rotate(${angle}deg) translateY(0)`;
                    document.body.appendChild(s);
                    
                    s.animate([
                        { transform: `rotate(${angle}deg) translateY(0)`, opacity: 1 },
                        { transform: `rotate(${angle}deg) translateY(1000px)`, opacity: 0 }
                    ], { duration: 1000, easing: 'ease-out' });
                    setTimeout(() => s.remove(), 1000);
                }

                // 4. REVEAL THE GALAXY ORB
                const orb = document.getElementById('orb');
                orb.style.transform = 'translate(-50%, -50%) scale(1)';
                setTimeout(() => { document.getElementById('zodiac-name').style.opacity = '1'; }, 1000);
            }, 3000);
        }
    </script>
</body>
</html>
