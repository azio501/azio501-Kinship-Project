 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v42 Final</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; color: #ff3300; }
        
        /* The Counter */
        #counter { position: absolute; top: 20px; left: 20px; font-size: 12px; letter-spacing: 2px; z-index: 100; color: #ff4500; }

        /* The Drifting Words */
        .word {
            position: fixed;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 0 10px #ff0000;
            font-size: 20px;
            cursor: pointer;
            user-select: none;
            z-index: 50;
            transition: opacity 0.3s, transform 0.3s;
        }

        /* THE CSS ORB (Pure Hardware Accelerated CSS) */
        #orb-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            /* Thick Glass Effect */
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0) 50%),
                        radial-gradient(circle, rgba(255,170,0,0.1) 0%, rgba(0,0,0,1) 100%);
            box-shadow: inset 0 0 50px rgba(255,255,255,0.1), 0 0 30px rgba(255,69,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 3s ease-out;
            z-index: 20;
        }

        /* The Inner Polished Core */
        #orb-core {
            width: 150px;
            height: 150px;
            border: 1px solid rgba(255,170,0,0.5);
            transform: rotate(45deg);
            animation: rotateCore 10s linear infinite;
        }

        @keyframes rotateCore {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* The ARIES Whisper */
        #zodiac-name {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #ffaa00;
            font-size: 9px;
            letter-spacing: 50px;
            text-indent: 50px;
            opacity: 0;
            transition: opacity 5s;
            z-index: 10;
        }

        /* Movement Animation */
        @keyframes drift {
            0% { transform: translate(0,0); }
            100% { transform: translate(var(--dx), var(--dy)); }
        }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    
    <div id="orb-container">
        <div id="orb-core"></div>
    </div>

    <div id="zodiac-name">ARIES</div>

    <script>
        let zapCount = 0;
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "REFERRALS", "FRONT DESK", "PRIOR AUTH", "bedpan"];

        function createWord() {
            if(zapCount >= 30) return;
            
            const w = document.createElement('div');
            w.className = 'word';
            w.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            
            // Random start position
            const x = Math.random() * 90;
            const y = Math.random() * 90;
            w.style.left = x + 'vw';
            w.style.top = y + 'vh';
            
            // Random drift direction
            w.style.setProperty('--dx', (Math.random() * 200 - 100) + 'px');
            w.style.setProperty('--dy', (Math.random() * 200 - 100) + 'px');
            w.style.animation = `drift ${5 + Math.random() * 5}s infinite alternate ease-in-out`;

            document.body.appendChild(w);

            w.onmouseover = () => {
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                w.style.opacity = '0';
                w.style.transform = 'scale(2)';
                setTimeout(() => w.remove(), 300);
                
                if(zapCount === 30) triggerRitual();
            };
        }

        // Spawn Loop
        const spawner = setInterval(createWord, 800);

        function triggerRitual() {
            clearInterval(spawner);
            document.querySelectorAll('.word').forEach(w => w.remove());
            document.getElementById('counter').style.display = 'none';
            
            // Bring in the CSS Orb
            const orb = document.getElementById('orb-container');
            orb.style.transform = 'translate(-50%, -50%) scale(1.5)';
            
            // Flash white
            document.body.style.backgroundColor = 'white';
            setTimeout(() => {
                document.body.style.backgroundColor = 'black';
                document.getElementById('zodiac-name').style.opacity = '1';
            }, 100);
        }
    </script>
</body>
</html>
