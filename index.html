 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | The Big Bang</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: none; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 18px; letter-spacing: 2px; }
        .floating-word { 
            position: absolute; color: #ff3300; font-weight: bold; font-size: 20px; 
            white-space: nowrap; pointer-events: auto; text-shadow: 0 0 10px #ff0000;
            transition: transform 0.1s;
        }
        #bottom-text { position: absolute; bottom: 50px; width: 100%; text-align: center; letter-spacing: 20px; font-size: 26px; color: #ff4500; }
    </style>
</head>
<body>

    <div id="ritual-layer">
        <div id="counter">TARGETS_NEUTRALIZED: 0/20</div>
    </div>

    <div id="ui-layer">
        <div id="bottom-text">ARIES</div>
    </div>

    <script>
        let zapCount = 0;
        let ritualComplete = false;
        const words = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "BEDPAN", "PET SCAN", "CO-PAYS", "PAPERWORK", "FLAT JELLO", "HOLD MUSIC"];
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // STARS
        const starGeo = new THREE.BufferGeometry();
        const starCount = 4000;
        const starPos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) starPos[i] = (Math.random() - 0.5) * 800;
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ size: 1.5, color: 0xffffff, transparent: true });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // THE ORB (Hidden initially)
        const orbGroup = new THREE.Group();
        const orb = new THREE.Mesh(
            new THREE.SphereGeometry(4, 64, 64),
            new THREE.MeshPhongMaterial({ color: 0x220000, transparent: true, opacity: 0, emissive: 0xff4500, emissiveIntensity: 0.5, shininess: 100 })
        );
        orbGroup.add(orb);
        
        const aNodes = [[-1.2, 1.5, 0.5], [0.3, 1.0, 1.2], [1.8, 0.2, 0.5], [1.3, -1.0, 0.1]];
        aNodes.forEach(p => {
            const n = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 }));
            n.position.set(...p);
            orbGroup.add(n);
        });
        scene.add(orbGroup);
        const light = new THREE.PointLight(0xffffff, 0, 100);
        light.position.set(10,10,10);
        scene.add(light);

        camera.position.z = 12;

        // SPAWN WORDS
        function createWord() {
            if(zapCount >= 20 || ritualComplete) return;
            const word = document.createElement('div');
            word.className = 'floating-word';
            word.innerText = words[Math.floor(Math.random() * words.length)];
            word.style.left = "-100px";
            word.style.top = Math.random() * window.innerHeight + "px";
            document.body.appendChild(word);

            let pos = -100;
            const speed = 2 + Math.random() * 5;
            
            const move = setInterval(() => {
                pos += speed;
                word.style.left = pos + "px";
                if(pos > window.innerWidth) { clearInterval(move); word.remove(); createWord(); }
            }, 20);

            word.onmouseover = () => {
                zapCount++;
                document.getElementById('counter').innerText = `TARGETS_NEUTRALIZED: ${zapCount}/20`;
                word.style.color = "#fff";
                word.innerText = "💥";
                setTimeout(() => { word.remove(); }, 200);
                clearInterval(move);
                if(zapCount === 20) startBigBang();
                else createWord();
            };
        }

        for(let i=0; i<5; i++) createWord();

        function startBigBang() {
            ritualComplete = true;
            document.getElementById('ritual-layer').style.display = 'none';
            
            // Star Suck-in effect
            const interval = setInterval(() => {
                stars.scale.x *= 0.9;
                stars.scale.y *= 0.9;
                stars.rotation.z += 0.2;
                if(stars.scale.x < 0.01) {
                    clearInterval(interval);
                    scene.remove(stars);
                    // 3 Second Void
                    setTimeout(bigBangExplosion, 3000);
                }
            }, 50);
        }

        function bigBangExplosion() {
            document.getElementById('ui-layer').style.display = 'block';
            orb.material.opacity = 0.4;
            light.intensity = 1.5;
            orbGroup.children.forEach(c => { if(c.material) c.material.opacity = 1; });
            
            // Flash effect
            renderer.setClearColor(0xffffff, 1);
            setTimeout(() => { renderer.setClearColor(0x000000, 1); }, 100);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(ritualComplete) {
                orbGroup.rotation.y += 0.005;
                orbGroup.rotation.x += 0.001;
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
