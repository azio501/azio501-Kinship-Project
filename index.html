<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | The Big Bang</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: none; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 18px; letter-spacing: 2px; }
        .floating-word { 
            position: absolute; color: #ff3300; font-weight: bold; 
            white-space: nowrap; pointer-events: auto; text-shadow: 0 0 10px #ff0000;
            transition: opacity 0.5s;
        }
        #bottom-text { position: absolute; bottom: 50px; width: 100%; text-align: center; letter-spacing: 20px; font-size: 26px; color: #ff4500; }
    </style>
</head>
<body>

    <div id="ritual-layer">
        <div id="counter">BUREAUCRACY_EXPUNGED: 0/20</div>
    </div>

    <div id="ui-layer">
        <div id="bottom-text">ARIES</div>
    </div>

    <script>
        let zapCount = 0;
        let ritualComplete = false;
        let activeWords = [];
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "BEDPAN", "PET SCAN", "CO-PAYS", "PAPERWORK", "HOLD MUSIC", "REFERRALS"];
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // THE GALAXY (Hidden until Bang)
        const starGeo = new THREE.BufferGeometry();
        const starCount = 6000;
        const starPos = new Float32Array(starCount * 3);
        const starSizes = new Float32Array(starCount);
        for(let i=0; i<starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 2; // Start tiny in center
            starPos[i*3+1] = (Math.random() - 0.5) * 2;
            starPos[i*3+2] = (Math.random() - 0.5) * 2;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // THE ORB
        const orbGroup = new THREE.Group();
        const orb = new THREE.Mesh(
            new THREE.SphereGeometry(4, 64, 64),
            new THREE.MeshPhongMaterial({ color: 0x220000, transparent: true, opacity: 0, emissive: 0xff4500, emissiveIntensity: 0.5 })
        );
        orbGroup.add(orb);
        scene.add(orbGroup);
        const light = new THREE.PointLight(0xffffff, 0, 100);
        light.position.set(10,10,10);
        scene.add(light);

        camera.position.z = 15;

        function createWord() {
            if(zapCount >= 20 || ritualComplete) return;
            const word = document.createElement('div');
            word.className = 'floating-word';
            word.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            
            // Random distance and size
            const depth = Math.random(); 
            word.style.fontSize = (10 + depth * 30) + "px";
            word.style.opacity = 0.3 + depth * 0.7;
            
            // Random edge entry
            const edge = Math.floor(Math.random() * 4);
            let x = 0, y = 0, dx = 0, dy = 0;
            const speed = 1 + Math.random() * 3;

            if(edge === 0) { x = -200; y = Math.random() * window.innerHeight; dx = speed; } // Left
            if(edge === 1) { x = window.innerWidth + 200; y = Math.random() * window.innerHeight; dx = -speed; } // Right
            if(edge === 2) { x = Math.random() * window.innerWidth; y = -100; dy = speed; } // Top
            if(edge === 3) { x = Math.random() * window.innerWidth; y = window.innerHeight + 100; dy = -speed; } // Bottom

            word.style.left = x + "px";
            word.style.top = y + "px";
            document.body.appendChild(word);

            const wordObj = { element: word, x, y, dx, dy };
            activeWords.push(wordObj);

            word.onmouseover = () => {
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/20`;
                word.innerText = "💥";
                word.style.color = "#fff";
                setTimeout(() => { word.remove(); }, 200);
                activeWords = activeWords.filter(w => w !== wordObj);
                if(zapCount === 20) startTheFlush();
                else createWord();
            };
        }

        for(let i=0; i<6; i++) createWord();

        function startTheFlush() {
            ritualComplete = true;
            // Spawn extra words for the frenzy
            for(let i=0; i<30; i++) {
                const w = document.createElement('div');
                w.className = 'floating-word';
                w.innerText = wordList[Math.floor(Math.random() * wordList.length)];
                w.style.left = Math.random() * window.innerWidth + "px";
                w.style.top = Math.random() * window.innerHeight + "px";
                document.body.appendChild(w);
                activeWords.push({ element: w, x: parseInt(w.style.left), y: parseInt(w.style.top), dx: 0, dy: 0, swirl: true });
            }

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            let flushInterval = setInterval(() => {
                activeWords.forEach(w => {
                    const diffX = centerX - w.x;
                    const diffY = centerY - w.y;
                    w.x += diffX * 0.1 + (diffY * 0.1); // Spiral math
                    w.y += diffY * 0.1 - (diffX * 0.1);
                    w.element.style.left = w.x + "px";
                    w.element.style.top = w.y + "px";
                    w.element.style.transform = `scale(${Math.max(0, (Math.abs(diffX)+Math.abs(diffY))/500)}) rotate(${w.x}deg)`;
                });

                if(activeWords.length > 0 && Math.abs(centerX - activeWords[0].x) < 10) {
                    clearInterval(flushInterval);
                    activeWords.forEach(w => w.element.remove());
                    setTimeout(bigBang, 2000);
                }
            }, 30);
        }

        function bigBang() {
            document.getElementById('ritual-layer').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            
            // Explosion of Stars
            starMat.opacity = 1;
            const positions = stars.geometry.attributes.position.array;
            let bangSpeed = 0;
            
            const animateBang = () => {
                bangSpeed += 0.1;
                for(let i=0; i<starCount; i++) {
                    positions[i*3] *= 1.15;
                    positions[i*3+1] *= 1.15;
                    positions[i*3+2] *= 1.15;
                }
                stars.geometry.attributes.position.needsUpdate = true;
                if(bangSpeed < 5) requestAnimationFrame(animateBang);
            };
            animateBang();

            orb.material.opacity = 0.5;
            light.intensity = 2;
            renderer.setClearColor(0xffffff, 1);
            setTimeout(() => { renderer.setClearColor(0x000000, 1); }, 150);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!ritualComplete) {
                activeWords.forEach(w => {
                    w.x += w.dx; w.y += w.dy;
                    w.element.style.left = w.x + "px";
                    w.element.style.top = w.y + "px";
                });
            }
            orbGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
