 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v44 Kinetic</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 12px; letter-spacing: 2px; z-index: 100; }

        /* RED WORDS */
        .word {
            position: fixed;
            color: #ff3300;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 0 10px #ff0000;
            font-size: 20px;
            z-index: 50;
            cursor: pointer;
            user-select: none;
            will-change: transform;
        }

        /* THE SPHERICAL ORB */
        #orb {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 380px;
            height: 380px;
            border-radius: 50%;
            /* 3D Glass Gradients */
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, rgba(0,0,0,0) 40%),
                        radial-gradient(circle at 70% 70%, rgba(255,140,0,0.1) 0%, rgba(0,0,0,1) 80%);
            box-shadow: 
                inset -10px -10px 40px rgba(255,100,0,0.2), 
                0 0 60px rgba(255,69,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 3s ease-out;
            overflow: hidden;
        }

        /* 3D Rotation Illusion (The moving highlight) */
        #orb::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: panShine 8s linear infinite;
        }

        @keyframes panShine {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        /* ARIES 12pt */
        #zodiac-name {
            position: fixed;
            bottom: 35px;
            width: 100%;
            text-align: center;
            color: #cc8800;
            font-size: 16px; /* Approx 12pt */
            letter-spacing: 40px;
            text-indent: 40px;
            opacity: 0;
            transition: opacity 5s;
            z-index: 10;
        }

    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    
    <div id="orb"></div>

    <div id="zodiac-name">ARIES</div>

    <script>
        let zapCount = 0;
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "REFERRALS", "FRONT DESK", "PRIOR AUTH", "bedpan"];
        let activeWords = [];

        function spawn() {
            if(zapCount >= 30) return;
            const w = document.createElement('div');
            w.className = 'word';
            w.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            
            // Random start positions and speeds
            let x = Math.random() * 100;
            let y = Math.random() * 90;
            let dx = (Math.random() * 0.1) + 0.05; // Drift speed
            
            w.style.left = x + 'vw';
            w.style.top = y + 'vh';
            document.body.appendChild(w);

            activeWords.push({ el: w, x, y, dx });

            w.onmouseover = () => {
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                w.style.opacity = '0';
                w.style.transform = 'scale(0.5)';
                if(zapCount === 30) finish();
            };
        }

        // Kinetic Loop for Words (Floating Left to Right)
        function drift() {
            if (zapCount < 30) {
                activeWords.forEach(obj => {
                    obj.x += obj.dx;
                    if (obj.x > 110) obj.x = -20; // Screen wrap
                    obj.el.style.left = obj.x + 'vw';
                });
            }
            requestAnimationFrame(drift);
        }
        drift();

        // Initial spawn
        for(let i=0; i<8; i++) spawn();
        setInterval(() => { if(activeWords.length < 15) spawn(); }, 1200);

        function finish() {
            document.getElementById('counter').style.display = 'none';
            activeWords.forEach(obj => obj.el.remove());
            activeWords = [];
            
            const orb = document.getElementById('orb');
            orb.style.transform = 'translate(-50%, -50%) scale(1)';
            
            setTimeout(() => {
                document.getElementById('zodiac-name').style.opacity = '1';
            }, 1500);
        }
    </script>
</body>
</html>
