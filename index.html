 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. THE UNIVERSE (Visible Immediately) */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a1f 0%, #000000 100%);
            z-index: 1;
        }

        /* Robust Starfield */
        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            opacity: 0.5; /* Always visible */
            animation: twinkle 4s infinite alternate;
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0.2; /* Starts faint so it's not a blank screen */
            background: 
                radial-gradient(circle at 20% 30%, rgba(120, 50, 255, 0.6), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 180, 255, 0.5), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 30, 160, 0.4), transparent 55%);
            filter: blur(60px);
            animation: bloomUniverse 5s ease-in-out 6s forwards, rotateNebula 180s linear infinite;
        }

        @keyframes bloomUniverse { to { opacity: 0.8; } }
        @keyframes rotateNebula { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes twinkle { to { opacity: 1; transform: scale(1.3); } }

        /* 2. THE STAGE (Layered Depth) */
        .stage {
            position: relative;
            z-index: 100;
            text-align: center;
            width: 100%;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(28px, 6vw, 48px);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            white-space: nowrap; /* FORCES ONE LINE */
            opacity: 0;
            animation: welcomePulseRise 8s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700;
            font-size: clamp(16px, 2.5vw, 22px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            position: absolute;
            width: 100%;
            left: 0;
            top: 60px; /* Positioned below Welcome */
            opacity: 0;
            z-index: 110; /* In front of Welcome */
            animation: ascentFastRise 8s ease-in-out forwards;
        }

        @keyframes welcomePulseRise {
            0% { opacity: 0; transform: scale(0.95); }
            15% { opacity: 1; text-shadow: 0 0 15px #FFD700; transform: scale(1); }
            30% { opacity: 0.1; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            65% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-250px); filter: blur(10px); }
        }

        @keyframes ascentFastRise {
            0%, 40% { opacity: 0; transform: translateY(40px) scale(0.8); }
            55% { opacity: 1; transform: translateY(10px) scale(1); }
            100% { opacity: 0; transform: translateY(-400px) scale(1.5); filter: blur(5px); }
        }

        /* 3. GLOWING ENTER BUTTON */
        .btn-container {
            opacity: 0;
            margin-top: 50px;
            animation: showBtn 2s ease-out 7.5s forwards;
        }

        .enter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 22px 80px;
            color: #ffffff;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            border-radius: 100px; /* Pill Shape */
            cursor: pointer;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            transition: 0.5s;
            animation: btnGlow 4s infinite ease-in-out;
        }

        .enter-btn:hover {
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            background: rgba(255, 215, 0, 0.1);
            transform: scale(1.05);
            color: #FFD700;
        }

        @keyframes showBtn { to { opacity: 1; } }
        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.4); }
        }
    </style>
</head>

        <div class="star" style="top: 30%; left: 70%; width: 1px; height: 1px; animation-delay: 1s;"></div>

        <div class="star" style="top: 20%; left: 40%; width: 1px; height: 1px; animation-delay: 3s;"></div>
