 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Kinship Project Base Camp</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: white; }
        
        /* INTRO PULSE SCREEN */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; background: #000;
        }
        .pulse-text {
            font-size: 3rem; letter-spacing: 15px; opacity: 0;
            animation: welcomePulse 4s ease-in-out 2 forwards;
        }
        .tagline { font-size: 1.2rem; letter-spacing: 5px; margin-top: 20px; opacity: 0; animation: fadeIn 2s 1s forwards; }

        @keyframes welcomePulse {
            0% { opacity: 0; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }
        @keyframes fadeIn { to { opacity: 1; } }

        /* MAIN UI - Hidden during pulse */
        #main-ui { opacity: 0; transition: opacity 2s; display: flex; visibility: hidden; }

        /* SIDEBAR - 5 ICONS */
        #nav-sidebar {
            width: 160px; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 35px;
            padding-left: 30px; z-index: 100;
        }
        .nav-icon {
            width: 65px; height: 65px; border: 2px solid; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s; position: relative;
            font-weight: bold; font-size: 1.2rem;
        }
        .nav-icon:hover { transform: scale(1.2); box-shadow: 0 0 25px currentColor; }
        
        /* Icon Colors */
        .icon-home { color: #ff4500; border-color: #ff4500; }
        .icon-lexicon { color: #00d2ff; border-color: #00d2ff; }
        .icon-orrery { color: #9d00ff; border-color: #9d00ff; }
        .icon-doctors { color: #39ff14; border-color: #39ff14; }
        .icon-gallery { color: #ff00ea; border-color: #ff00ea; }

        /* TOOLTIP BOXES */
        .tooltip {
            position: absolute; left: 85px; background: rgba(10, 10, 10, 0.95);
            border: 1px solid currentColor; padding: 15px; width: 220px;
            opacity: 0; pointer-events: none; transition: 0.3s; font-size: 0.9rem;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }
        .nav-icon:hover .tooltip { opacity: 1; }

        /* CENTER STAGE */
        #center-stage {
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh;
        }
        #orb-container {
            width: 550px; height: 550px; border-radius: 50%;
            overflow: hidden; box-shadow: 0 0 120px rgba(255,100,0,0.15);
            border: 1px solid rgba(255,255,255,0.05);
        }
        #orb-img { width: 100%; height: 100%; object-fit: cover; }

        #zodiac-name {
            margin-top: 40px; font-size: 4.5rem; letter-spacing: 65px; 
            text-indent: 65px; color: #ffaa00; font-weight: bold;
            filter: drop-shadow(0 0 20px rgba(255,170,0,0.3));
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="pulse-text">WELCOME TO KINSHIP</div>
        <div class="tagline">A PERSONAL ASCENT</div>
    </div>

    <div id="main-ui">
        <nav id="nav-sidebar">
            <div class="nav-icon icon-home">H<div class="tooltip">HOME: Return to the center of Kinship.</div></div>
            <div class="nav-icon icon-lexicon">L<div class="tooltip">LEXICON: The encyclopedia of terms and shared wisdom.</div></div>
            <div class="nav-icon icon-orrery">O<div class="tooltip">ORRERY: View the celestial trade of energy.</div></div>
            <div class="nav-icon icon-doctors">D<div class="tooltip">DOCTORS QUARTERS: Information and professional insights.</div></div>
            <div class="nav-icon icon-gallery">G<div class="tooltip">GALLERY: Stories and art from the community.</div></div>
        </nav>

        <main id="center-stage">
            <div id="orb-container">
                <img id="orb-img" src="Glass%20Orb%20Aries%20copilot.png" alt="Aries Orb">
            </div>
            <div id="zodiac-name">ARIES</div>
        </main>
    </div>

    <script>
        // Start the transition after the pulse finishes (8 seconds)
        setTimeout(() => {
            const intro = document.getElementById('intro-screen');
            const main = document.getElementById('main-ui');
            
            intro.style.transition = "opacity 2s";
            intro.style.opacity = "0";
            
            setTimeout(() => {
                intro.style.display = 'none';
                main.style.visibility = 'visible';
                main.style.opacity = '1';
            }, 2000);
        }, 8000);
    </script>
</body>
</html>
