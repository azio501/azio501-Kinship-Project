 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v59 Critical Mass</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 14px; letter-spacing: 2px; z-index: 100; font-weight: bold; }

        .word {
            position: fixed; color: #ff0000; font-weight: 900; white-space: nowrap;
            text-shadow: 0 0 20px #ff0000; font-size: 28px; z-index: 50;
            cursor: pointer; user-select: none; pointer-events: auto;
        }

        /* THE HEAVY GLASS ORB */
        #orb {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 500px; height: 500px; border-radius: 50%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, transparent 40%),
                radial-gradient(circle at 60% 60%, rgba(255,140,0,0.15) 0%, transparent 60%),
                #080808;
            box-shadow: 
                inset 0 0 100px #000,
                inset 10px 10px 50px rgba(255,255,255,0.1),
                0 0 100px rgba(255,69,0,0.2);
            display: flex; align-items: center; justify-content: center;
            z-index: 60; transition: transform 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #symbol { 
            font-size: 200px; color: #ffcc00; 
            filter: drop-shadow(0 0 35px #ff8800);
            animation: rotate3D 15s linear infinite;
        }

        @keyframes rotate3D { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .streak { position: absolute; background: #fff; width: 2px; height: 150px; opacity: 0; }

        #zodiac-name {
            position: fixed; bottom: 50px; width: 100%; text-align: center;
            color: #ffaa00; font-size: 60px; letter-spacing: 85px; text-indent: 85px;
            opacity: 0; font-weight: 900; transition: opacity 5s; z-index: 70;
        }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="orb"><div id="symbol">♈</div></div>
    <div id="zodiac-name">ARIES</div>

    <script>
        let zapCount = 0;
        let ritualComplete = false;
        const words = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "REFERRALS", "FRONT DESK", "PRIOR AUTH", "DEDUCTIBLE", "PRE-EXISTING"];
        let active = [];

        function spawn(x, y, isBlast = false) {
            if(ritualComplete) return;
            const el = document.createElement('div');
            el.className = 'word';
            el.innerText = words[Math.floor(Math.random() * words.length)];
            
            let sx = x ?? (Math.random() * 80 + 10);
            let sy = y ?? (Math.random() * 80 + 10);
            
            // Fast blast velocity
            let speed = isBlast ? 4.5 : 1.2;
            let dx = (Math.random() - 0.5) * speed;
            let dy = (Math.random() - 0.5) * speed;
            
            el.style.left = sx + 'vw'; el.style.top = sy + 'vh';
            document.body.appendChild(el);
            const obj = { el, x: sx, y: sy, dx, dy };

            el.onmouseover = () => {
                if(ritualComplete) return;
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                
                el.remove();
                active = active.filter(i => i !== obj);

                if(zapCount < 30) {
                    // THE CRITICAL MASS: 1 hit = 12 fragments
                    for(let i=0; i<12; i++) spawn(obj.x, obj.y, true);
                } else {
                    initiateSuck();
                }
            };
            active.push(obj);
        }

        // START: 2 words
        spawn(); spawn();

        function update() {
            if(!ritualComplete) {
                active.forEach(o => {
                    o.x += o.dx; o.y += o.dy;
                    // Bounds checking
                    if(o.x < -30) o.x = 130; if(o.x > 130) o.x = -30;
                    if(o.y < -30) o.y = 130; if(o.y > 130) o.y = -30;
                    o.el.style.left = o.x + 'vw'; o.el.style.top = o.y + 'vh';
                });
            }
            requestAnimationFrame(update);
        }
        update();

        function initiateSuck() {
            ritualComplete = true;
            document.getElementById('counter').style.display = 'none';
            
            active.forEach(o => {
                o.el.style.transition = "all 0.9s cubic-bezier(0.6, -0.28, 0.735, 0.045)";
                o.el.style.left = "50vw"; o.el.style.top = "50vh";
                o.el.style.transform = "scale(0) rotate(180deg)";
                o.el.style.opacity = "0";
            });

            // 3 SECOND BLACKOUT
            setTimeout(() => {
                active.forEach(o => o.el.remove());
                
                // THE BAM: Starburst
                for(let i=0; i<100; i++) {
                    const s = document.createElement('div');
                    s.className = 'streak';
                    s.style.left = '50vw'; s.style.top = '50vh';
                    const angle = Math.random() * 360;
                    s.style.transform = `rotate(${angle}deg) translateY(0)`;
                    document.body.appendChild(s);
                    s.animate([
                        { transform: `rotate(${angle}deg) translateY(0)`, opacity: 1 },
                        { transform: `rotate(${angle}deg) translateY(1200px)`, opacity: 0 }
                    ], { duration: 800, easing: 'ease-out' });
                    setTimeout(() => s.remove(), 800);
                }

                // REVEAL ORB
                const orb = document.getElementById('orb');
                orb.style.transform = 'translate(-50%, -50%) scale(1)';
                setTimeout(() => { document.getElementById('zodiac-name').style.opacity = '1'; }, 1000);
            }, 3000);
        }
    </script>
</body>
</html>
