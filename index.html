 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        /* 1. THE STARFIELD & UNIVERSE */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #050515 0%, #000000 100%);
            z-index: 1;
        }

        /* Starfield CSS included here */
        .stars {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 4s infinite alternate;
        }

        @keyframes twinkle {
            to { opacity: 0.8; transform: scale(1.2); }
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0; 
            background: 
                radial-gradient(circle at 30% 30%, rgba(100, 60, 255, 0.7), transparent 45%),
                radial-gradient(circle at 70% 70%, rgba(0, 180, 255, 0.6), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 20, 150, 0.5), transparent 55%);
            filter: blur(60px);
            animation: bloomUniverse 5s ease-in-out 6s forwards, rotateNebula 120s linear infinite;
        }

        @keyframes bloomUniverse {
            to { opacity: 0.8; }
        }

        @keyframes rotateNebula {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 2. THE STAGE */
        .kinship-stage {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .text-container {
            text-align: center;
            white-space: nowrap;
            position: relative;
        }

        /* Welcome Text - Pulses and then rises slowly */
        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(24px, 6vw, 42px); 
            text-transform: uppercase;
            letter-spacing: 0.35em;
            margin: 0;
            opacity: 0;
            position: relative;
            z-index: 2;
            animation: welcomeSequence 8s ease-in-out forwards;
        }

        /* Ascent Text - Moves FASTER upward to create depth */
        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700; 
            font-size: clamp(16px, 2.5vw, 22px);
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.5em;
            opacity: 0;
            position: absolute;
            width: 100%;
            left: 0;
            top: 40px;
            z-index: 3; /* Placed "in front" */
            animation: ascentSequence 8s ease-in-out forwards;
        }

        @keyframes welcomeSequence {
            0% { opacity: 0; transform: scale(0.95); }
            15% { opacity: 1; text-shadow: 0 0 10px #FFD700; transform: scale(1); }
            30% { opacity: 0.1; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            60% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-200px); filter: blur(10px); }
        }

        @keyframes ascentSequence {
            0%, 40% { opacity: 0; transform: translateY(40px); }
            55% { opacity: 1; transform: translateY(20px); }
            100% { opacity: 0; transform: translateY(-350px); filter: blur(5px); }
        }

        /* 3. SHIMMERING ENTER BUTTON */
        .btn-container {
            opacity: 0;
            margin-top: 50px;
            pointer-events: auto;
            animation: revealButton 2s ease-out 8s forwards;
        }

        .enter-button {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 22px 85px;
            color: #ffffff;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            border-radius: 100px;
            cursor: pointer;
            backdrop-filter: blur(20px);
            overflow: hidden;
            transition: all 0.6s ease;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            animation: goldenPulse 4s infinite ease-in-out;
        }

        .enter-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
            animation: shimmer 5s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            20%, 100% { left: 100%; }
        }

        @keyframes goldenPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.4); }
        }

        .enter-button:hover {
            color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
            transform: scale(1.08);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.5);
        }

        @keyframes revealButton {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="galaxy-bg">
        <div class="stars">
            <div class="star" style="top: 10%; left: 15%; width: 2px; height: 2px;"></div>
            <div class="star" style="top: 35%; left: 80%; width: 1px; height: 1px;"></div>
            <div class="star" style="top: 70%; left: 10%; width: 3px; height: 3px;"></div>
            <div class="star" style="top: 85%; left: 55%; width: 2px; height: 2px;"></div>
            <div class="star" style="top: 20%; left: 50%; width: 1px; height: 1px;"></div>
            <div class="star" style="top: 60%; left: 90%; width: 2px; height: 2px;"></div>
        </div>
        <div class="nebula"></div>
    </div>

    <div class="kinship-stage">
        <div class="text-container">
            <h1 class="welcome-text">Welcome to Kinship</h1>
            <div class="ascent-text">A Personal Ascent</div>
        </div>
        
        <div class="btn-container">
            <button class="enter-button" onclick="location.reload()">Enter</button>
        </div>
    </div>

</body>
</html>
