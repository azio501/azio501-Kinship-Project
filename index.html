 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        /* 1. LAYERED STARFIELD */
        .stars-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Distant Stars (Small & Dim) */
        .stars-distant {
            width: 1px; height: 1px;
            background: transparent;
            box-shadow: 10vw 10vh #fff, 25vw 40vh #fff, 45vw 15vh #fff, 85vw 25vh #fff, 15vw 85vh #fff, 60vw 60vh #fff, 95vw 90vh #fff, 40vw 80vh #fff;
            animation: flicker 10s infinite alternate;
        }

        /* Near Stars (Larger & Brighter) */
        .stars-near {
            width: 2px; height: 2px;
            background: transparent;
            box-shadow: 20vw 30vh #fff, 70vw 20vh #fff, 50vw 70vh #fff, 80vw 80vh #fff, 10vw 60vh #fff, 35vw 15vh #fff;
            animation: flicker 4s infinite alternate-reverse;
            filter: blur(0.5px);
        }

        @keyframes flicker {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        /* 2. THE NEBULA GASES */
        .nebula-gases {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            z-index: 2;
            opacity: 0;
            /* Drifting gas effect using radial gradients */
            background: 
                radial-gradient(circle at 30% 40%, rgba(60, 20, 120, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(20, 50, 150, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(100, 20, 60, 0.2) 0%, transparent 50%);
            animation: revealGases 5s ease-out 6s forwards, drift 30s linear infinite;
        }

        @keyframes revealGases {
            to { opacity: 1; }
        }

        @keyframes drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(5deg); }
        }

        /* 3. THE TEXT STAGE */
        .kinship-stage {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(24px, 6vw, 42px); 
            text-transform: uppercase;
            letter-spacing: 0.35em;
            opacity: 0;
            position: absolute;
            animation: doubleBreathAndRise 7s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700; 
            font-size: clamp(16px, 2.5vw, 22px);
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin-top: 80px;
            opacity: 0;
            position: absolute;
            animation: sharpAppearAndRise 7s ease-in-out forwards;
        }

        @keyframes doubleBreathAndRise {
            0% { opacity: 0; transform: scale(0.95); }
            15% { opacity: 1; text-shadow: 0 0 15px #FFD700; transform: scale(1); }
            30% { opacity: 0.1; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-250px); filter: blur(5px); letter-spacing: 0.6em; }
        }

        @keyframes sharpAppearAndRise {
            0%, 40% { opacity: 0; transform: translateY(10px); }
            55% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-300px); letter-spacing: 0.8em; }
        }

        /* 4. THE ENTER BUTTON */
        .enter-btn-wrapper {
            opacity: 0;
            z-index: 101;
            animation: revealButton 2s ease-out 8.5s forwards;
        }

        .enter-button {
            background: rgba(0, 0, 0, 0.4);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 18px 60px;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.5s ease;
            backdrop-filter: blur(15px);
            pointer-events: auto;
        }

        .enter-button:hover {
            border-color: #FFD700;
            color: #FFD700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
        }

        @keyframes revealButton {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="stars-distant"></div>
        <div class="stars-near"></div>
    </div>

    <div class="nebula-gases"></div>

    <div class="kinship-stage">
        <h1 class="welcome-text">Welcome to Kinship</h1>
        <div class="ascent-text">A Personal Ascent</div>
        
        <div class="enter-btn-wrapper">
            <button class="enter-button" onclick="alert('Ascending...')">Enter</button>
        </div>
    </div>

</body>
</html>
