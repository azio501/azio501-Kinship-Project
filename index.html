 <style>
    /* 1. THE UNIVERSE */
    body, html {
        margin: 0;
        padding: 0;
        background: #000000;
        overflow: hidden;
    }

    .galaxy-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
        z-index: 1;
    }

    /* 2. THE STAGE */
    .kinship-stage {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        pointer-events: none;
    }

    .welcome-text {
        font-family: 'Georgia', serif;
        color: #ffffff;
        font-size: clamp(22px, 5vw, 38px); 
        text-transform: uppercase;
        letter-spacing: 0.35em;
        white-space: nowrap;
        margin: 0;
        opacity: 0;
        /* Adjusted for the double-pulse-then-climb logic */
        animation: doubleBreathAndRise 9s ease-in-out forwards;
    }

    .ascent-text {
        font-family: sans-serif;
        color: #FFD700; 
        font-size: 11px;
        letter-spacing: 0.6em;
        margin-top: 20px;
        opacity: 0;
        /* This waits for the second pulse to appear */
        animation: appearAndRise 9s ease-in-out forwards;
    }

    /* 3. THE MAGIC: TWO PULSES THEN ASCENT */
    @keyframes doubleBreathAndRise {
        /* FIRST PULSE */
        0% { opacity: 0; transform: scale(0.98); }
        15% { opacity: 1; text-shadow: 0 0 30px #FFD700, 0 0 60px #FFA500; transform: scale(1); }
        30% { opacity: 0.1; text-shadow: 0 0 5px #FFD700; transform: scale(0.98); }

        /* SECOND PULSE (The Re-appearance) */
        45% { opacity: 1; text-shadow: 0 0 40px #FFD700, 0 0 80px #FFA500; transform: scale(1); }
        60% { opacity: 1; text-shadow: 0 0 10px #FFD700; transform: translateY(0); }

        /* THE ASCENT (Starts at 70%) */
        100% { 
            opacity: 0; 
            transform: translateY(-250px); 
            filter: blur(15px); 
        }
    }

    @keyframes appearAndRise {
        /* Stay invisible during Pulse 1 */
        0%, 35% { opacity: 0; transform: translateY(10px); }
        
        /* Appear with Pulse 2 */
        50% { opacity: 0.8; transform: translateY(0); }
        65% { opacity: 0.8; transform: translateY(0); }

        /* Join the Ascent */
        100% { 
            opacity: 0; 
            transform: translateY(-250px); 
            filter: blur(10px); 
        }
    }
</style>

<div class="galaxy-bg"></div>

<div class="kinship-stage">
    <h1 class="welcome-text">Welcome to Kinship</h1>
    <div class="ascent-text">A PERSONAL ASCENT</div>
</div>
