 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries Reset v36</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 14px; letter-spacing: 2px; z-index: 10; }
        .floating-word { position: absolute; color: #ff3300; font-weight: bold; white-space: nowrap; pointer-events: auto; text-shadow: 0 0 10px #ff0000; }
        
        #ui-layer { 
            position: absolute; bottom: 12%; left: 0; width: 100%; 
            display: flex; justify-content: center; pointer-events: none; z-index: 5; 
        }
        #zodiac-name { 
            color: #ffaa00; font-size: 18px; letter-spacing: 40px; opacity: 0; 
            transition: opacity 4s; text-shadow: 0 0 15px #ff4500;
            text-align: center; margin-left: 40px; 
        }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="ui-layer"><div id="zodiac-name">ARIES</div></div>

    <script>
        let zapCount = 0, ritualComplete = false, activeWords = [];
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "ELEVATOR MUSIC", "REFERRALS", "FLAPPIN' GOWN", "BARIUM DRINK", "SUGAR", "CHAULKY", "FRONT DESK", "THEREPY", "PRIOR AUTH", "bedpan"];
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Star Field
        const starGeo = new THREE.BufferGeometry();
        const starCount = 30000;
        const pos = new Float32Array(starCount * 3);
        const vel = new Float32Array(starCount * 3);
        for(let i=0; i<starCount; i++) {
            pos[i*3] = (Math.random() - 0.5) * 20;
            pos[i*3+1] = (Math.random() - 0.5) * 20;
            pos[i*3+2] = (Math.random() - 0.5) * 20;
            vel[i*3] = pos[i*3] * 60;
            vel[i*3+1] = pos[i*3+1] * 60;
            vel[i*3+2] = pos[i*3+2] * 60;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.04, color: 0xffffff, transparent: true, opacity: 0 });
        const starSystem = new THREE.Points(starGeo, starMat);
        scene.add(starSystem);

        // --- CRYSTAL ORB ASSEMBLY ---
        const orbGroup = new THREE.Group();
        
        // 1. The Thick Glass (Physical-style but Standard for reliability)
        const glass = new THREE.Mesh(
            new THREE.SphereGeometry(10, 64, 64),
            new THREE.MeshStandardMaterial({ 
                color: 0xffffff, metalness: 0.2, roughness: 0.05, 
                transparent: true, opacity: 0, 
                emissive: 0x111111 
            })
        );
        
        // 2. The Golden Heart (Aries Constellation Core)
        const heart = new THREE.Mesh(
            new THREE.IcosahedronGeometry(6, 1),
            new THREE.MeshBasicMaterial({ color: 0xffaa00, wireframe: true, transparent: true, opacity: 0 })
        );

        // 3. The Polished Shine (Rim Light Layer)
        const shine = new THREE.Mesh(
            new THREE.SphereGeometry(10.2, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, side: THREE.BackSide })
        );
        
        orbGroup.add(glass);
        orbGroup.add(heart);
        orbGroup.add(shine);
        orbGroup.position.z = -300; 
        orbGroup.scale.set(0.1, 0.1, 0.1);
        scene.add(orbGroup);

        // Lighting
        const mainLight = new THREE.PointLight(0xffffff, 4, 1000);
        mainLight.position.set(50, 50, 100);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        camera.position.z = 80;

        function createWord() {
            if(ritualComplete) return;
            const word = document.createElement('div');
            word.className = 'floating-word';
            word.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            const depth = Math.random();
            word.style.left = Math.random() * window.innerWidth + "px";
            word.style.top = Math.random() * window.innerHeight + "px";
            document.body.appendChild(word);
            activeWords.push({ 
                element: word, 
                x: parseFloat(word.style.left), 
                y: parseFloat(word.style.top), 
                dx: (Math.random()-0.5)*12, 
                dy: (Math.random()-0.5)*12, 
                sucking: false 
            });

            word.onmouseover = () => {
                if(ritualComplete) return;
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                if(zapCount === 30) startTheFlush();
                word.remove();
            };
        }

        function spawn() { if(!ritualComplete) { createWord(); setTimeout(spawn, 600); } }
        spawn();

        function startTheFlush() {
            ritualComplete = true;
            activeWords.forEach(w => w.sucking = true);
            setTimeout(() => {
                let flushTimer = setInterval(() => {
                    activeWords.forEach((w, index) => {
                        const dX = (window.innerWidth/2) - w.x; const dY = (window.innerHeight/2) - w.y;
                        w.x += dX * 0.25; w.y += dY * 0.25;
                        w.element.style.left = w.x + "px"; w.element.style.top = w.y + "px";
                        w.element.style.transform = `scale(${Math.abs(dX)/200})`;
                        if(Math.abs(dX) < 15) { w.element.remove(); activeWords.splice(index, 1); }
                    });
                    if(activeWords.length === 0) { clearInterval(flushTimer); bigBang(); }
                }, 16);
            }, 500);
        }

        function bigBang() {
            document.getElementById('counter').style.display = 'none';
            starMat.opacity = 1;
            const starPos = starSystem.geometry.attributes.position.array;
            let frame = 0;
            const explode = () => {
                frame++;
                for(let i=0; i<starCount; i++) {
                    starPos[i*3] += vel[i*3] * 0.08;
                    starPos[i*3+1] += vel[i*3+1] * 0.08;
                    starPos[i*3+2] += vel[i*3+2] * 0.08;
                }
                starSystem.geometry.attributes.position.needsUpdate = true;
                if(frame > 20 && orbGroup.position.z < 20) {
                    orbGroup.position.z += 8; 
                    const s = Math.min(3.5, orbGroup.scale.x * 1.2);
                    orbGroup.scale.set(s,s,s);
                    glass.material.opacity = 0.45;
                    heart.material.opacity = 1;
                    shine.material.opacity = 0.3; // That polished sheen
                }
                if(frame < 220) requestAnimationFrame(explode);
                else document.getElementById('zodiac-name').style.opacity = "1";
            };
            explode();
        }

        function animate() {
            requestAnimationFrame(animate);
            orbGroup.rotation.y += 0.005;
            heart.rotation.x += 0.015;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
