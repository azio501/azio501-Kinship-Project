 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. THE UNIVERSE */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
            z-index: 1;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.8;
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0.5;
            background: 
                radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.4), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.3), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 30, 160, 0.3), transparent 55%);
            filter: blur(60px);
            animation: rotateNebula 180s linear infinite;
        }

        @keyframes rotateNebula { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 2. THE STAGE */
        .stage {
            position: relative;
            z-index: 100;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(26px, 6vw, 46px);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            white-space: nowrap; 
            margin: 0;
            position: relative;
            z-index: 10;
            will-change: transform, opacity;
            /* STARTS CRISP */
            animation: welcomeSequence 9s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700;
            font-size: clamp(14px, 2.5vw, 22px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            position: absolute;
            width: 100%;
            left: 0;
            top: 60px;
            z-index: 999; /* ABSOLUTELY IN FRONT */
            opacity: 0;
            will-change: transform, opacity;
            animation: ascentSequence 9s ease-in-out forwards;
        }

        @keyframes welcomeSequence {
            0% { opacity: 1; transform: scale(1); text-shadow: 0 0 10px #FFD700; }
            20% { opacity: 0.3; text-shadow: none; }
            /* SECOND PULSE - SHARP GOLD GLOW */
            40% { opacity: 1; text-shadow: 0 0 20px #FFD700; transform: scale(1); }
            75% { opacity: 1; transform: translateY(0); filter: blur(0px); }
            100% { opacity: 0; transform: translateY(-350px); filter: blur(12px); }
        }

        @keyframes ascentSequence {
            0%, 42% { opacity: 0; transform: translateY(100px) scale(0.6); }
            58% { opacity: 1; transform: translateY(15px) scale(1.1); }
            /* FLIES DIRECTLY OVER WELCOME */
            100% { opacity: 0; transform: translateY(-600px) scale(3); filter: blur(4px); }
        }

        /* 3. BUTTON */
        .btn-container {
            opacity: 0;
            margin-top: 60px;
            animation: fadeIn 1s ease-out 8.5s forwards;
        }

        .enter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 18px 70px;
            color: #fff;
            font-family: 'Georgia', serif;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            border-radius: 100px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            transition: 0.3s;
        }
        
        .enter-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
        }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="galaxy-bg" id="starfield">
        <div class="nebula"></div>
    </div>

    <div class="stage">
        <h1 class="welcome-text">Welcome to Kinship</h1>
        <div class="ascent-text">A Personal Ascent</div>
        <div class="btn-container">
            <button class="enter-btn" onclick="location.reload()">Enter</button>
        </div>
    </div>

    <script>
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 2 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            starfield.appendChild(star);
        }
    </script>
</body>
</html>
