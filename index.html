 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. THE UNIVERSE (Instant Visibility) */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
            z-index: 1;
        }

        /* Heavy Starfield - Always Visible */
        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            opacity: 0.6; 
            animation: twinkle 3s infinite alternate;
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0.4; /* Visible immediately to prevent blank screen */
            background: 
                radial-gradient(circle at 20% 30%, rgba(100, 50, 255, 0.5), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.4), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 30, 160, 0.3), transparent 55%);
            filter: blur(60px);
            animation: bloomFull 6s ease-in-out 5s forwards, rotateNebula 180s linear infinite;
        }

        @keyframes bloomFull { to { opacity: 0.9; } }
        @keyframes rotateNebula { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes twinkle { to { opacity: 1; transform: scale(1.3); } }

        /* 2. THE STAGE (Depth Layering) */
        .stage {
            position: relative;
            z-index: 100;
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(26px, 6vw, 46px);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            white-space: nowrap; /* FORCES ONE LINE */
            margin: 0;
            opacity: 0;
            z-index: 101;
            animation: welcomePulseRise 8s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700;
            font-size: clamp(14px, 2.5vw, 20px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            margin-top: 20px;
            opacity: 0;
            z-index: 105; /* In front of Welcome */
            animation: ascentFastRise 8s ease-in-out forwards;
        }

        @keyframes welcomePulseRise {
            0% { opacity: 0; transform: scale(0.95); }
            15% { opacity: 1; text-shadow: 0 0 15px #FFD700; transform: scale(1); }
            30% { opacity: 0.1; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            65% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-280px); filter: blur(12px); }
        }

        @keyframes ascentFastRise {
            0%, 45% { opacity: 0; transform: translateY(40px) scale(0.8); }
            60% { opacity: 1; transform: translateY(0px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-450px) scale(1.6); filter: blur(4px); }
        }

        .btn
