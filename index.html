 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        /* 1. THE DEEP STARFIELD */
        .stars-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
        }

        .stars-distant, .stars-near {
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            background: transparent;
        }

        .stars-distant {
            box-shadow: 10vw 10vh #fff, 25vw 40vh #fff, 45vw 15vh #fff, 85vw 25vh #fff, 15vw 85vh #fff, 60vw 60vh #fff, 95vw 90vh #fff, 40vw 80vh #fff;
            animation: flicker 8s infinite alternate;
        }

        .stars-near {
            width: 2px; height: 2px;
            box-shadow: 20vw 30vh #fff, 70vw 20vh #fff, 50vw 70vh #fff, 80vw 80vh #fff, 10vw 60vh #fff, 35vw 15vh #fff;
            animation: flicker 3s infinite alternate-reverse;
            filter: blur(0.5px);
        }

        @keyframes flicker {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* 2. VIBRANT NEBULA GASES */
        .nebula-gases {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            z-index: 2;
            opacity: 0;
            background: 
                radial-gradient(circle at 30% 40%, rgba(80, 40, 180, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(0, 120, 200, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(180, 20, 100, 0.3) 0%, transparent 50%);
            /* Starts appearing EARLIER to prevent the "nothing happens" gap */
            animation: revealGases 4s ease-out 5.5s forwards, drift 40s linear infinite;
        }

        @keyframes revealGases {
            to { opacity: 1; }
        }

        @keyframes drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(10deg); }
        }

        /* 3. INTRO TEXT */
        .kinship-stage {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .welcome-text, .ascent-text {
            font-family: 'Georgia', serif;
            text-transform: uppercase;
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .welcome-text {
            color: #ffffff;
            font-size: clamp(24px, 6vw, 42px); 
            letter-spacing: 0.35em;
            animation: doubleBreathAndRise 7s ease-in-out forwards;
        }

        .ascent-text {
            color: #FFD700; 
            font-size: clamp(16px, 2.5vw, 22px);
            font-weight: 700; 
            letter-spacing: 0.5em;
            margin-top: 80px;
            animation: sharpAppearAndRise 7s ease-in-out forwards;
        }

        @keyframes doubleBreathAndRise {
            0% { opacity: 0; transform: scale(0.95); }
            15% { opacity: 1; text-shadow: 0 0 15px #FFD700; transform: scale(1); }
            30% { opacity: 0.1; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-250px); filter: blur(8px); letter-spacing: 0.8em; }
        }

        @keyframes sharpAppearAndRise {
            0%, 40% { opacity: 0; transform: translateY(10px); }
            55% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-300px); letter-spacing: 0.9em; }
        }

        /* 4. SHINY PULSING GLASS BUTTON */
        .enter-btn-wrapper {
            opacity: 0;
            z-index: 101;
            /* Appears at 7.5s, right as the text fully clears */
            animation: revealButton 1.5s ease-out 7.5s forwards;
        }

        .enter-button {
            position: relative;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 20px 60px;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px; /* Fully Rounded */
            backdrop-filter: blur(15px);
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            animation: pulseGlow 3s infinite ease-in-out 9s; /* Pulse starts after appearing */
            pointer-events: auto;
        }
