 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        /* 1. LAYERED UNIVERSE & HEAVY STARFIELD */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #08081a 0%, #000000 100%);
            z-index: 1;
        }

        /* Many more stars with different depths */
        .star-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            opacity: 0.2;
            animation: twinkle 4s infinite alternate;
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0; 
            background: 
                radial-gradient(circle at 20% 30%, rgba(120, 50, 255, 0.6), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.5), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 30, 160, 0.4), transparent 55%),
                radial-gradient(circle at 70% 20%, rgba(50, 255, 200, 0.3), transparent 40%);
            filter: blur(70px);
            animation: bloomUniverse 6s ease-in-out 6.5s forwards, rotateNebula 150s linear infinite;
        }

        @keyframes bloomUniverse {
            to { opacity: 0.8; }
        }

        @keyframes rotateNebula {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* 2. THE STAGE - Fixed One-Line & Layering */
        .kinship-stage {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .text-container {
            position: relative;
            text-align: center;
            /* FORCES ONE LINE REGARDLESS OF SCREEN SIZE */
            white-space: nowrap; 
            min-width: max-content; 
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(28px, 6vw, 48px); 
            text-transform: uppercase;
            letter-spacing: 0.4em;
            margin: 0;
            opacity: 0;
            position: relative;
            z-index: 5; /* Behind Ascent */
            animation: welcomePulseRise 8.5s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700; 
            font-size: clamp(16px, 2.5vw, 22px);
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.6em;
            opacity: 0;
            position: absolute;
            width: 100%;
            left: 0;
            top: 120%; /* Start below */
            z-index: 10; /* IN FRONT OF WELCOME */
            animation: ascentFastRise 8.5s ease-in-out forwards;
        }

        @keyframes welcomePulseRise {
            0% { opacity: 0; transform: scale(0.95); }
            15% { opacity: 1; text-shadow: 0 0 10px #FFD700; transform: scale(1); }
            30% { opacity: 0.1; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            60% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-200px); filter: blur(12px); }
        }

        @keyframes ascentFastRise {
            0%, 40% { opacity: 0; transform: translateY(50px); }
            55% { opacity: 1; transform: translateY(0px); }
            65% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-450px) scale(1.2); filter: blur(4px); }
        }

        /* 3. GLOWING ENTER BUTTON */
        .btn-container {
            opacity: 0;
            margin-top: 80px;
            pointer-events: auto;
            animation: revealButton 2.5s ease-out 8.5s forwards;
        }

        .enter-button {
            position: relative;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 22px 90px;
            color: #ffffff;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            border-radius: 100px;
            cursor: pointer;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            overflow: hidden;
            transition: all 0.6s ease;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            animation: goldenPulse 4s infinite ease-in-out;
        }

        .enter-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
            animation: shimmer 6s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            20%, 100% { left: 100%; }
        }

        @keyframes goldenPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
            50% { box-shadow: 0 0 45px rgba(255, 215, 0, 0.4); border-color: rgba(255, 215, 0, 0.8); }
        }

        .enter-button:hover {
            color: #FFD700;
            background: rgba(255, 215, 0, 0.15);
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.6);
        }

        @keyframes revealButton {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="galaxy-bg">
        <div class="star-layer">
            <div class="star" style="top: 5%; left: 10%; width: 1px; height: 1px;"></div>
            <div class="star" style="top: 25%; left: 85%; width: 1px; height: 1px; animation-delay: 1s;"></div>
            <div class="star" style="top: 75%; left: 15%; width: 1px; height: 1px; animation-delay: 2s;"></div>
            <div class="star" style="top: 90%; left: 60%; width: 1px; height: 1px;"></div>
            <div class="star" style="top: 15%; left: 45%; width: 2px; height: 2px; animation-delay: 0.5s;"></div>
            <div class="star" style="top: 60%; left: 90%; width: 2px; height: 2px; animation-delay: 1.5s;"></div>
            <div class="star" style="top: 40%; left: 20%; width: 2px; height: 2px; animation-delay: 3s;"></div>
            <div class="star" style="top: 30%; left: 50%; width: 3px; height: 3px; animation-delay: 2.5s;"></div>
            <div class="star" style="top: 80%; left: 30%; width: 3px; height: 3px; animation-delay: 1.2s;"></div>
        </div>
        <div class="nebula"></div>
    </div>

    <div class="kinship-stage">
        <div class="text-container">
            <h1 class="welcome-text">Welcome to Kinship</h1>
            <div class="ascent-text">A Personal Ascent</div>
        </div>
        
        <div class="btn-container">
            <button class="enter-button" onclick="location.reload()">Enter</button>
        </div>
    </div>

</body>
</html>
