 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries Reset v31</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 14px; letter-spacing: 2px; z-index: 10; }
        .floating-word { position: absolute; color: #ff3300; font-weight: bold; white-space: nowrap; pointer-events: auto; text-shadow: 0 0 10px #ff0000; }
        
        #ui-layer { 
            position: absolute; 
            bottom: 15%; 
            left: 0;
            width: 100%; 
            display: flex;
            justify-content: center;
            pointer-events: none; 
            z-index: 5; 
        }
        #zodiac-name { 
            color: #ffaa00; 
            font-size: 18px; 
            letter-spacing: 40px; 
            opacity: 0; 
            transition: opacity 4s; 
            text-shadow: 0 0 15px #ff4500;
            text-indent: 40px; /* Perfectly balances the letter-spacing */
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="ui-layer"><div id="zodiac-name">ARIES</div></div>

    <script>
        let zapCount = 0, ritualComplete = false, activeWords = [];
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "ELEVATOR MUSIC", "REFERRALS", "FLAPPIN' GOWN", "BARIUM DRINK", "SUGAR", "CHAULKY", "FRONT DESK", "THEREPY", "PRIOR AUTH", "bedpan"];
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Stars
        const starGeo = new THREE.BufferGeometry();
        const starCount = 30000;
        const pos = new Float32Array(starCount * 3);
        const vel = new Float32Array(starCount * 3);
        for(let i=0; i<starCount; i++) {
            pos[i*3] = (Math.random() - 0.5) * 10;
            pos[i*3+1] = (Math.random() - 0.5) * 10;
            pos[i*3+2] = (Math.random() - 0.5) * 10;
            vel[i*3] = pos[i*3] * 40;
            vel[i*3+1] = pos[i*3+1] * 40;
            vel[i*3+2] = pos[i*3+2] * 40;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.04, color: 0xffffff, transparent: true, opacity: 0 });
        const starSystem = new THREE.Points(starGeo, starMat);
        scene.add(starSystem);

        // --- ORB CALIBRATION ---
        const orbGroup = new THREE.Group();
        const glassOrb = new THREE.Mesh(
            new THREE.SphereGeometry(10, 64, 64),
            new THREE.MeshStandardMaterial({
                color: 0xffffff, metalness: 0.9, roughness: 0.1,
                transparent: true, opacity: 0
            })
        );
        orbGroup.add(glassOrb);
        
        const core = new THREE.Mesh(
            new THREE.IcosahedronGeometry(6, 1),
            new THREE.MeshBasicMaterial({ color: 0xffcc00, wireframe: true, transparent: true, opacity: 0 })
        );
        orbGroup.add(core);
        orbGroup.position.z = -300; 
        orbGroup.scale.set(0.1, 0.1, 0.1);
        scene.add(orbGroup);

        const light = new THREE.PointLight(0xffffff, 2, 1000);
        light.position.set(0, 50, 50);
        scene.add(light);
        camera.position.z = 50;

        function createWord() {
            if(ritualComplete) return;
            const word = document.createElement('div');
            word.className = 'floating-word';
            word.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            const depth = Math.random();
            word.style.fontSize = (14 + depth * 30) + "px";
            const edge = Math.floor(Math.random() * 4);
            let x, y, dx = 0, dy = 0;
            const speed = 3 + Math.random() * 6;
            if(edge === 0) { x = -500; y = Math.random() * window.innerHeight; dx = speed; } 
            else if(edge === 1) { x = window.innerWidth + 500; y = Math.random() * window.innerHeight; dx = -speed; } 
            else if(edge === 2) { x = Math.random() * window.innerWidth; y = -200; dy = speed; } 
            else { x = Math.random() * window.innerWidth; y = window.innerHeight + 200; dy = -speed; } 
            word.style.left = x + "px"; word.style.top = y + "px";
            document.body.appendChild(word);
            activeWords.push({ element: word, x, y, dx, dy, sucking: false });

            word.onmouseover = () => {
                if(ritualComplete) return;
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                word.innerText = "💥";
                if(zapCount === 30) startTheFlush();
                setTimeout(() => { if(!ritualComplete) word.remove(); }, 80);
            };
        }

        function spawnLoop() {
            if(!ritualComplete) {
                createWord();
                setTimeout(spawnLoop, Math.max(30, 450 - (zapCount * 15)));
            }
        }
        spawnLoop();

        function startTheFlush() {
            ritualComplete = true;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            activeWords.forEach(w => w.sucking = true);
            setTimeout(() => {
                let flushTimer = setInterval(() => {
                    activeWords.forEach((w, index) => {
                        const dX = centerX - w.x; const dY = centerY - w.y;
                        const dist = Math.sqrt(dX*dX + dY*dY);
                        w.x += dX * 0.3 + (dY * 0.4); w.y += dY * 0.3 - (dX * 0.4);
                        w.element.style.left = w.x + "px"; w.element.style.top = w.y + "px";
                        w.element.style.transform = `scale(${dist/300})`;
                        if(dist < 50) { w.element.remove(); activeWords.splice(index, 1); }
                    });
                    if(activeWords.length === 0) { clearInterval(flushTimer); setTimeout(bigBang, 1500); }
                }, 16);
            }, 600);
        }

        function bigBang() {
            activeWords.forEach(w => w.element.remove());
            document.getElementById('counter').style.display = 'none';
            starMat.opacity = 1;
            const starPos = starSystem.geometry.attributes.position.array;
            let frame = 0;
            const explode = () => {
                frame++;
                for(let i=0; i<starCount; i++) {
                    starPos[i*3] += vel[i*3] * 0.05;
                    starPos[i*3+1] += vel[i*3+1] * 0.05;
                    starPos[i*3+2] += vel[i*3+2] * 0.05;
                }
                starSystem.geometry.attributes.position.needsUpdate = true;
                if(frame > 10 && orbGroup.position.z < 0) {
                    orbGroup.position.z += 5; 
                    const s = Math.min(2.2, orbGroup.scale.x * 1.1);
                    orbGroup.scale.set(s,s,s);
                    glassOrb.material.opacity = 0.6; core.material.opacity = 1;
                }
                if(frame < 250) requestAnimationFrame(explode);
                else document.getElementById('zodiac-name').style.opacity = "1";
            };
            explode();
            renderer.setClearColor(0xffffff, 1);
            setTimeout(() => renderer.setClearColor(0x000000, 1), 120);
        }

        function animate() {
            requestAnimationFrame(animate);
            activeWords.forEach(w => {
                if(!w.sucking) { w.x += w.dx; w.y += w.dy; w.element.style.left = w.x + "px"; w.element.style.top = w.y + "px"; }
            });
            orbGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
