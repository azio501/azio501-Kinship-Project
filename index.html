 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v46 The Ghost Orb</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 12px; letter-spacing: 2px; z-index: 100; }

        .word {
            position: fixed; color: #ff3300; font-weight: bold; white-space: nowrap;
            text-shadow: 0 0 10px #ff0000; font-size: 22px; z-index: 50;
            cursor: pointer; user-select: none; will-change: transform;
        }

        /* THE ORB - Now visible from the start as a "Ghost" */
        #orb {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 400px; height: 400px;
            border-radius: 50%;
            /* Ghostly initial state */
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0) 40%),
                        radial-gradient(circle at 65% 65%, rgba(255,140,0,0.05) 0%, rgba(0,0,0,1) 80%);
            box-shadow: inset -5px -5px 20px rgba(255,100,0,0.05), 0 0 20px rgba(255,69,0,0.05);
            opacity: 0.15; 
            display: flex; align-items: center; justify-content: center;
            transition: all 0.5s ease; /* Smooth "feeding" transition */
            overflow: hidden;
            z-index: 5;
        }

        #orb::after {
            content: ''; position: absolute; width: 200%; height: 100%;
            background: linear-gradient(110deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: rotateSphere 10s linear infinite;
        }

        @keyframes rotateSphere {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        #zodiac-name {
            position: fixed; bottom: 40px; width: 100%; text-align: center;
            color: #ffaa00; font-size: 28px; letter-spacing: 50px; text-indent: 50px;
            opacity: 0; font-weight: bold; transition: opacity 5s; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="orb"></div>
    <div id="zodiac-name">ARIES</div>

    <script>
        let zapCount = 0;
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "REFERRALS", "FRONT DESK", "PRIOR AUTH", "bedpan", "BARIUM DRINK", "CO-AUTH"];
        let activeWords = [];
        let spawnRate = 1000;

        function spawn() {
            if(zapCount >= 30) return;
            const w = document.createElement('div');
            w.className = 'word';
            w.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            
            const side = Math.floor(Math.random() * 4);
            let x, y, dx, dy;
            const baseSpeed = 0.5 + (zapCount / 15);

            if(side === 0) { x = Math.random()*100; y = -10; dx = (Math.random()-0.5)*0.1; dy = baseSpeed; }
            else if(side === 1) { x = Math.random()*100; y = 110; dx = (Math.random()-0.5)*0.1; dy = -baseSpeed; }
            else if(side === 2) { x = -20; y = Math.random()*100; dx = baseSpeed; dy = (Math.random()-0.5)*0.1; }
            else { x = 120; y = Math.random()*100; dx = -baseSpeed; dy = (Math.random()-0.5)*0.1; }
            
            w.style.left = x + 'vw'; w.style.top = y + 'vh';
            document.body.appendChild(w);
            activeWords.push({ el: w, x, y, dx, dy });

            w.onmouseover = () => {
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                w.style.opacity = '0';
                
                // --- FEED THE ORB ---
                const orb = document.getElementById('orb');
                const progress = zapCount / 30;
                orb.style.opacity = 0.15 + (progress * 0.4); // Gets clearer
                orb.style.boxShadow = `inset -15px -15px 50px rgba(255,100,0,${progress * 0.2}), 0 0 ${20 + (progress * 40)}px rgba(255,69,0,${progress * 0.2})`;
                
                spawnRate = Math.max(150, 1000 - (zapCount * 30));
                if(zapCount === 30) finish();
            };
        }

        function drift() {
            if (zapCount < 30) {
                activeWords.forEach((obj, index) => {
                    obj.x += obj.dx; obj.y += obj.dy;
                    obj.el.style.left = obj.x + 'vw'; obj.el.style.top = obj.y + 'vh';
                    if(obj.x < -30 || obj.x > 130 || obj.y < -30 || obj.y > 130) {
                        obj.el.remove(); activeWords.splice(index, 1);
                    }
                });
            }
            requestAnimationFrame(drift);
        }
        drift();

        function spawnLoop() {
            if(zapCount < 30) { spawn(); setTimeout(spawnLoop, spawnRate); }
        }
        spawnLoop();

        function finish() {
            document.getElementById('counter').style.display = 'none';
            activeWords.forEach(obj => obj.el.remove());
            
            const orb = document.getElementById('orb');
            // THE BIG BANG REVEAL
            orb.style.opacity = '1';
            orb.style.transform = 'translate(-50%, -50%) scale(1.1)';
            orb.style.background = `radial-gradient(circle at 35% 35%, rgba(255,255,255,0.4) 0%, rgba(0,0,0,0) 40%),
                                    radial-gradient(circle at 65% 65%, rgba(255,140,0,0.2) 0%, rgba(0,0,0,1) 80%)`;
            
            setTimeout(() => {
                document.getElementById('zodiac-name').style.opacity = '1';
            }, 1000);
        }
    </script>
</body>
</html>
