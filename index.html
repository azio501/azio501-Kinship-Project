 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        /* 1. THE FOUNDATION */
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            color: #ffffff;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        /* 2. THE UNIVERSE (Visible immediately) */
        .universe-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            /* Base faint glow so it's never a "blank" black screen */
            background: radial-gradient(circle at center, #0a0a1f 0%, #000000 100%);
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            /* Subtle base opacity, then brightens */
            opacity: 0.2; 
            background: 
                radial-gradient(circle at 30% 30%, rgba(100, 50, 255, 0.4), transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(0, 150, 255, 0.3), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(200, 20, 100, 0.2), transparent 50%);
            filter: blur(50px);
            animation: brightenUniverse 8s ease-in-out forwards, rotateNebula 60s linear infinite;
        }

        @keyframes brightenUniverse {
            to { opacity: 1; }
        }

        @keyframes rotateNebula {
            from { transform: rotate(0deg); }
            to { transform: rotate(10deg); }
        }

        /* 3. THE STARS (Using a more reliable render method) */
        .star-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 4s infinite alternate;
        }

        @keyframes twinkle {
            to { opacity: 1; transform: scale(1.2); }
        }

        /* 4. THE TEXT EXPERIENCE */
        .stage {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .welcome-text {
            font-size: clamp(24px, 8vw, 48px);
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin: 0;
            opacity: 0;
            animation: textFlow 7s ease-in-out forwards;
        }

        .ascent-text {
            color: #FFD700;
            font-size: clamp(14px, 3vw, 20px);
            text-transform: uppercase;
            letter-spacing: 0.8em;
            margin-top: 20px;
            opacity: 0;
            animation: textFlowSub 7s ease-in-out forwards;
        }

        @keyframes textFlow {
            0% { opacity: 0; transform: scale(0.9); filter: blur(10px); }
            20% { opacity: 1; filter: blur(0px); }
            80% { opacity: 1; transform: scale(1); filter: blur(0px); }
            100% { opacity: 0; transform: translateY(-150px) scale(1.1); filter: blur(15px); }
        }

        @keyframes textFlowSub {
            0%, 30% { opacity: 0; }
            50% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-180px); filter: blur(10px); }
        }

        /* 5. THE SOFT GLOW BUTTON (Pill-shaped & Glassy) */
        .btn-container {
            opacity: 0;
            margin-top: 40px;
            animation: showBtn 2s ease-out 6.5s forwards;
        }

        .enter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px 60px;
            color: #ffffff;
            font-size: 14px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            border-radius: 100px; /* Rounded pill shape */
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.5s ease;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            animation: buttonPulse 4s infinite ease-in-out;
        }

        .enter-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #FFD700;
            color: #FFD700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            letter-spacing: 0.7em;
            transform: scale(1.05);
        }

        @keyframes showBtn {
            to { opacity: 1; }
        }

        @keyframes buttonPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.2); }
        }
    </style>
</head>
<body>

    <div class="universe-bg">
        <div class="nebula"></div>
        <div class="star-layer">
            <div class="star" style="top: 10%; left: 20%; width: 2px; height: 2px;"></div>
            <div class="star" style="top: 30%; left: 80%; width: 1px; height: 1px; animation-delay: 1s;"></div>
            <div class="star" style="top: 70%; left: 10%; width: 3px; height: 3px; animation-delay: 2s;"></div>
            <div class="star" style="top: 85%; left: 60%; width: 1px; height: 1px; animation-delay: 0.5s;"></div>
            <div class="star" style="top: 15%; left: 50%; width: 2px; height: 2px; animation-delay: 3s;"></div>
            <div class="star" style="top: 50%; left: 90%; width: 1px; height: 1px; animation-delay: 1.5s;"></div>
        </div>
    </div>

    <div class="stage">
        <h1 class="welcome-text">Welcome to Kinship</h1>
        <p class="ascent-text">A Personal Ascent</p>
        
        <div class="btn-container">
            <button class="enter-btn" onclick="location.reload()">Enter</button>
        </div>
    </div>

</body>
</html>
