 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries Reset v24</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 18px; letter-spacing: 2px; z-index: 10; }
        .floating-word { position: absolute; color: #ff3300; font-weight: bold; white-space: nowrap; pointer-events: auto; text-shadow: 0 0 10px #ff0000; will-change: transform; }
        #ui-layer { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; z-index: 5; }
        #zodiac-name { color: #ff4500; font-size: 60px; letter-spacing: 40px; opacity: 0; margin-top: 500px; transition: opacity 4s; text-align: center; width: 100%; text-shadow: 0 0 30px #ff0000; }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="ui-layer"><div id="zodiac-name">ARIES</div></div>

    <script>
        let zapCount = 0, ritualComplete = false, activeWords = [];
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "ELEVATOR MUSIC", "REFERRALS", "FLAPPIN' GOWN", "BARIUM DRINK", "SUGAR", "CHAULKY", "FRONT DESK", "THEREPY", "PRIOR AUTH", "bedpan"];
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- GALAXY ---
        const starCount = 30000;
        const starGeo = new THREE.BufferGeometry();
        const pos = new Float32Array(starCount * 3);
        const vel = new Float32Array(starCount * 3);
        for(let i=0; i<starCount; i++) {
            pos[i*3] = (Math.random() - 0.5) * 5; 
            pos[i*3+1] = (Math.random() - 0.5) * 5;
            pos[i*3+2] = (Math.random() - 0.5) * 5;
            vel[i*3] = pos[i*3] * 25;
            vel[i*3+1] = pos[i*3+1] * 25;
            vel[i*3+2] = pos[i*3+2] * 25;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.07, color: 0xffffff, transparent: true, opacity: 0 });
        const starSystem = new THREE.Points(starGeo, starMat);
        scene.add(starSystem);

        // --- THE ORB ---
        const orbGroup = new THREE.Group();
        const glassOrb = new THREE.Mesh(new THREE.SphereGeometry(4, 64, 64), new THREE.MeshStandardMaterial({color: 0xff4500, metalness: 0.9, roughness: 0.1, transparent: true, opacity: 0 }));
        orbGroup.add(glassOrb);
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2.8, 1), new THREE.MeshBasicMaterial({ color: 0xffcc00, wireframe: true, transparent: true, opacity: 0 }));
        orbGroup.add(core);
        orbGroup.position.z = -400; 
        orbGroup.scale.set(0.1, 0.1, 0.1);
        scene.add(orbGroup);
        const light = new THREE.PointLight(0xffffff, 0, 500);
        light.position.set(0, 0, 50);
        scene.add(light);
        camera.position.z = 30;

        function createWord() {
            if(ritualComplete) return;
            const word = document.createElement('div');
            word.className = 'floating-word';
            word.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            const depth = Math.random();
            word.style.fontSize = (16 + depth * 35) + "px";
            word.style.opacity = 0.5 + depth * 0.5;
            const edge = Math.floor(Math.random() * 4);
            let x, y, dx = 0, dy = 0;
            const speed = 2 + Math.random() * 5;
            if(edge === 0) { x = -500; y = Math.random() * window.innerHeight; dx = speed; } 
            else if(edge === 1) { x = window.innerWidth + 500; y = Math.random() * window.innerHeight; dx = -speed; } 
            else if(edge === 2) { x = Math.random() * window.innerWidth; y = -200; dy = speed; } 
            else { x = Math.random() * window.innerWidth; y = window.innerHeight + 200; dy = -speed; } 
            word.style.left = x + "px"; word.style.top = y + "px";
            document.body.appendChild(word);
            const wObj = { element: word, x, y, dx, dy, sucking: false };
            activeWords.push(wObj);

            word.onmouseover = () => {
                if(ritualComplete) return;
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                word.innerText = "💥";
                if(zapCount === 30) startTheFlush();
                setTimeout(() => { if(!ritualComplete) word.remove(); }, 100);
            };
        }

        // SCALING SPAWNER: Starts slow, gets faster as you zap
        let spawnRate = 800;
        function spawner() {
            if(!ritualComplete) {
                createWord();
                spawnRate = Math.max(100, 800 - (zapCount * 22));
                setTimeout(spawner, spawnRate);
            }
        }
        spawner();

        function startTheFlush() {
            ritualComplete = true;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            activeWords.forEach(w => { 
                w.sucking = true; 
                w.dx *= 0.2; w.dy *= 0.2; // Slow to casual crawl
            });
            
            setTimeout(() => { // Give 1 second of "casual crawl" before suction hits
                let flushTimer = setInterval(() => {
                    activeWords.forEach((w, index) => {
                        const dX = centerX - w.x; const dY = centerY - w.y;
                        const dist = Math.sqrt(dX*dX + dY*dY);
                        w.x += dX * 0.15 + (dY * 0.25); w.y += dY * 0.15 - (dX * 0.25);
                        w.element.style.left = w.x + "px"; w.element.style.top = w.y + "px";
                        w.element.style.transform = `scale(${dist/400}) rotate(${dist*4}deg)`;
                        if(dist < 40) { w.element.remove(); activeWords.splice(index, 1); }
                    });
                    if(activeWords.length === 0) { clearInterval(flushTimer); setTimeout(bigBang, 3000); }
                }, 16);
            }, 1000);
        }

        function bigBang() {
            activeWords.forEach(w => w.element.remove());
            document.getElementById('counter').style.display = 'none';
            starMat.opacity = 1;
            const starPos = starSystem.geometry.attributes.position.array;
            let frame = 0;
            const explode = () => {
                frame++;
                for(let i=0; i<starCount; i++) {
                    starPos[i*3] += vel[i*3] * 0.04;
                    starPos[i*3+1] += vel[i*3+1] * 0.04;
                    starPos[i*3+2] += vel[i*3+2] * 0.04;
                }
                starSystem.geometry.attributes.position.needsUpdate = true;
                if(frame > 15 && orbGroup.position.z < 0) {
                    orbGroup.position.z += 6; 
                    const s = Math.min(1.5, orbGroup.scale.x * 1.12);
                    orbGroup.scale.set(s,s,s);
                    glassOrb.material.opacity = 0.85; core.material.opacity = 1; light.intensity = s * 8;
                }
                if(frame < 250) requestAnimationFrame(explode);
                else document.getElementById('zodiac-name').style.opacity = "1";
            };
            explode();
            renderer.setClearColor(0xffffff, 1);
            setTimeout(() => renderer.setClearColor(0x000000, 1), 120);
        }

        function animate() {
            requestAnimationFrame(animate);
            activeWords.forEach(w => {
                if(!w.sucking) { w.x += w.dx; w.y += w.dy; w.element.style.left = w.x + "px"; w.element.style.top = w.y + "px"; }
            });
            orbGroup.rotation.y += 0.01; core.rotation.x += 0.02;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
