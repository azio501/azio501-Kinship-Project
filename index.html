 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v51 Final Swarm</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 14px; letter-spacing: 2px; z-index: 100; font-weight: bold; }

        .word {
            position: fixed; color: #ff2200; font-weight: 900; white-space: nowrap;
            text-shadow: 0 0 15px #ff0000; font-size: 24px; z-index: 50;
            cursor: pointer; user-select: none; will-change: transform;
            pointer-events: auto; opacity: 0.8; padding: 10px; /* Bigger hit area */
        }

        /* HEAVY DARK ORB */
        #orb {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 450px; height: 450px; border-radius: 50%;
            background: rgba(5, 5, 5, 0.98);
            box-shadow: 
                inset 10px 10px 50px rgba(255,255,255,0.05),
                inset -20px -20px 80px rgba(0,0,0,1),
                0 0 30px rgba(255,69,0,0.05);
            opacity: 0.1; display: flex; align-items: center; justify-content: center;
            transition: all 0.6s ease-in-out;
            z-index: 5;
        }

        #zodiac-name {
            position: fixed; bottom: 50px; width: 100%; text-align: center;
            color: #ffaa00; font-size: 42px; letter-spacing: 70px; text-indent: 70px;
            opacity: 0; font-weight: bold; transition: opacity 8s ease; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/50</div>
    <div id="orb"></div>
    <div id="zodiac-name">ARIES</div>

    <script>
        let zapCount = 0;
        let ritualComplete = false;
        const targetGoal = 50; 
        const wordList = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "REFERRALS", "FRONT DESK", "PRIOR AUTH", "bedpan", "BARIUM DRINK", "CO-AUTH", "ELEVATOR MUSIC", "FORMS", "RE-FILL", "DEDUCTIBLE", "PRE-EXISTING", "OUT-OF-NETWORK", "AMBULANCE BILL", "LAB WORK"];
        let activeWords = [];

        function spawn() {
            if(ritualComplete) return;
            const w = document.createElement('div');
            w.className = 'word';
            w.innerText = wordList[Math.floor(Math.random() * wordList.length)];
            
            // Random start positions
            let x = Math.random() * 100;
            let y = Math.random() * 100;
            
            // GLACIAL SPEED (Very slow)
            let dx = (Math.random() - 0.5) * 0.2;
            let dy = (Math.random() - 0.5) * 0.2;
            
            w.style.left = x + 'vw';
            w.style.top = y + 'vh';
            document.body.appendChild(w);

            const wordObj = { el: w, x, y, dx, dy };
            
            w.onmouseover = () => {
                if(ritualComplete) return;
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/${targetGoal}`;
                
                const orb = document.getElementById('orb');
                const p = zapCount / targetGoal;
                // Orb gets clearer and more "ignited"
                orb.style.opacity = 0.1 + (p * 0.9);
                orb.style.boxShadow = `inset 10px 10px 50px rgba(255,255,255,${p*0.1}), 
                                       0 0 ${40 + (p * 100)}px rgba(255,69,0,${p*0.5})`;
                
                w.remove();
                activeWords = activeWords.filter(item => item !== wordObj);
                if(zapCount >= targetGoal) startBigBang();
            };

            activeWords.push(wordObj);
        }

        // START WITH A MASSIVE WALL (150 words)
        for(let i=0; i<150; i++) spawn();

        function update() {
            if(!ritualComplete) {
                activeWords.forEach((obj) => {
                    obj.x += obj.dx;
                    obj.y += obj.dy;
                    
                    // Slow Screen Wrap
                    if(obj.x < -15) obj.x = 115;
                    if(obj.x > 115) obj.x = -15;
                    if(obj.y < -15) obj.y = 115;
                    if(obj.y > 115) obj.y = -15;

                    obj.el.style.left = obj.x + 'vw';
                    obj.el.style.top = obj.y + 'vh';
                });

                // Keep the screen flooded
                if (activeWords.length < 130) spawn();
            }
            requestAnimationFrame(update);
        }
        update();

        function startBigBang() {
            ritualComplete = true;
            document.getElementById('counter').style.display = 'none';
            activeWords.forEach(obj => obj.el.remove());
            activeWords = [];

            const orb = document.getElementById('orb');
            orb.style.opacity = '1';
            orb.style.transform = 'translate(-50%, -50%) scale(1.1)';
            // The Reveal: A bright, polished core
            orb.style.background = 'radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, rgba(255,160,0,0.1) 40%, #000 100%)';
            
            setTimeout(() => {
                document.getElementById('zodiac-name').style.opacity = '1';
            }, 1000);
        }
    </script>
</body>
</html>
