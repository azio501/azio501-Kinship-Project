 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        /* 1. SOLID BASE - NO GRADIENTS UNTIL LOADED */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. THE UNIVERSE (Forced on) */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.9;
        }

        /* 3. THE TEXT STAGE */
        .stage {
            position: relative;
            z-index: 100;
            text-align: center;
            width: 100%;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(26px, 6vw, 46px);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            white-space: nowrap;
            margin: 0;
            /* STARTS VISIBLE */
            opacity: 1;
            position: relative;
            z-index: 10;
            animation: welcomePulse 9s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700;
            font-size: clamp(14px, 2.5vw, 22px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            position: absolute;
            width: 100%;
            left: 0;
            top: 60px;
            /* FORCED TO TOP LAYER */
            z-index: 9999; 
            opacity: 0;
            animation: ascentFlyby 9s ease-in-out forwards;
        }

        /* 4. ANIMATIONS - SIMPLE & STABLE */
        @keyframes welcomePulse {
            0% { opacity: 1; text-shadow: 0 0 15px #FFD700; }
            20% { opacity: 0.4; text-shadow: none; }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; }
            75% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: translateY(-200px); }
        }

        @keyframes ascentFlyby {
            0%, 45% { opacity: 0; transform: translateY(50px) scale(0.8); }
            65% { opacity: 1; transform: translateY(10px) scale(1.2); }
            /* NO BLUR - KEEPS IT SHARP */
            100% { opacity: 0; transform: translateY(-500px) scale(3); }
        }

        /* 5. BUTTON */
        .btn-container {
            opacity: 0;
            margin-top: 80px;
            animation: showBtn 1s ease-out 8.5s forwards;
        }

        .enter-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #FFD700;
            padding: 20px 80px;
            color: #fff;
            font-family: 'Georgia', serif;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        @keyframes showBtn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="galaxy-bg" id="starfield"></div>

    <div class="stage">
        <h1 class="welcome-text">Welcome to Kinship</h1>
        <div class="ascent-text">A Personal Ascent</div>
        
        <div class="btn-container">
            <button class="enter-btn" onclick="location.reload()">Enter</button>
        </div>
    </div>

    <script>
        // Star generator that runs AFTER the page structure is visible
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = (Math.random() * 2 + 1) + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            starfield.appendChild(star);
        }
    </script>
</body>
</html>
