 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        /* 1. LAYERED UNIVERSE & HEAVY STARFIELD */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #08081a 0%, #000000 100%);
            z-index: 1;
        }

        /* Many more stars with different depths */
        .star-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            opacity: 0.2;
            animation: twinkle 4s infinite alternate;
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0; 
            background: 
                radial-gradient(circle at 20% 30%, rgba(120, 50, 255, 0.6), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.5), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 30, 160, 0.4), transparent 55%),
                radial-gradient(circle at 70% 20%, rgba(50, 255, 200, 0.3), transparent 40%);
            filter: blur(70px);
            animation: bloomUniverse 6s ease-in-out 6.5s forwards, rotateNebula 150s linear infinite;
        }

        @keyframes bloomUniverse {
            to { opacity: 0.8; }
        }

        @keyframes rotateNebula {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* 2. THE STAGE - Fixed One-Line & Layering */
        .kinship-stage {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .text-container {
            position: relative;
            text-align: center;
            /* FORCES ONE LINE REGARDLESS OF SCREEN SIZE */
            white-space: nowrap; 
            min-width: max-content; 
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(28px, 6vw, 48px); 
            text-transform: uppercase;
            letter-spacing: 0.4em;
            margin: 0;
            opacity: 0;
            position: relative;
            z-index: 5; /* Behind Ascent */
            animation: welcomePulseRise 8.5s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700; 
            font-size: clamp(16px, 2.5vw, 22px);
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.6em;
            opacity: 0;
            position: absolute;
            width: 100%;
            left: 0;
            top: 120%; /* Start below */
            z-index: 10; /* IN FRONT OF WELCOME */
            animation: ascentFastRise 8.5s ease-in-out forwards;
        }

        @keyframes welcomePulseRise {
            0% { opacity: 0; transform: scale(0.95); }
            15% { opacity: 1; text-shadow: 0 0 10px #FFD700; transform: scale(1); }
            30% { opacity: 0.1; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            60% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-200px); filter: blur(12px); }
        }

        @keyframes ascentFastRise {
            0%, 40% { opacity: 0; transform: translateY(50px); }
