 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KOC | Aries v58 The Real Deal</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #counter { position: absolute; top: 20px; left: 20px; color: #ff4500; font-size: 14px; letter-spacing: 2px; z-index: 100; font-weight: bold; }

        .word {
            position: fixed; color: #ff0000; font-weight: 900; white-space: nowrap;
            text-shadow: 0 0 20px #ff0000; font-size: 28px; z-index: 50;
            cursor: pointer; user-select: none;
        }

        /* THE HEAVY GLASS ORB - Realistic Specular Lighting */
        #orb {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 500px; height: 500px; border-radius: 50%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5) 0%, transparent 40%), /* Sharp Shine */
                radial-gradient(circle at 60% 60%, rgba(255,140,0,0.1) 0%, transparent 60%), /* Internal Warmth */
                #050505;
            box-shadow: 
                inset 0 0 100px #000,
                inset 10px 10px 40px rgba(255,255,255,0.1),
                0 0 80px rgba(255,69,0,0.2);
            display: flex; align-items: center; justify-content: center;
            z-index: 60; transition: transform 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        /* The 3D Rotating Symbol */
        #symbol { 
            font-size: 200px; color: #ffcc00; 
            filter: drop-shadow(0 0 30px #ff8800) drop-shadow(0 0 10px #fff);
            animation: rotate3D 12s linear infinite;
            user-select: none;
        }

        @keyframes rotate3D {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* The "Stars & Stripes" */
        .streak { position: absolute; background: #fff; width: 2px; height: 120px; opacity: 0; }

        #zodiac-name {
            position: fixed; bottom: 50px; width: 100%; text-align: center;
            color: #ffaa00; font-size: 60px; letter-spacing: 85px; text-indent: 85px;
            opacity: 0; font-weight: 900; transition: opacity 5s; z-index: 70;
        }
    </style>
</head>
<body>

    <div id="counter">BUREAUCRACY_EXPUNGED: 0/30</div>
    <div id="orb"><div id="symbol">♈</div></div>
    <div id="zodiac-name">ARIES</div>

    <script>
        let zapCount = 0;
        let ritualComplete = false;
        const words = ["WAITING ROOMS", "INSURANCE CARDS", "SCHEDULING", "MEDICARE", "PET scan", "CT scan", "COPAY", "PAPERWORK", "REFERRALS", "FRONT DESK", "PRIOR AUTH", "DEDUCTIBLE"];
        let active = [];

        function spawn(x, y, isBlast = false) {
            if(ritualComplete) return;
            const el = document.createElement('div');
            el.className = 'word';
            el.innerText = words[Math.floor(Math.random() * words.length)];
            
            let sx = x ?? (Math.random() * 80 + 10);
            let sy = y ?? (Math.random() * 80 + 10);
            let speed = isBlast ? 3.5 : 1;
            let dx = (Math.random() - 0.5) * speed;
            let dy = (Math.random() - 0.5) * speed;
            
            el.style.left = sx + 'vw'; el.style.top = sy + 'vh';
            document.body.appendChild(el);
            const obj = { el, x: sx, y: sy, dx, dy };

            el.onmouseover = () => {
                if(ritualComplete) return;
                zapCount++;
                document.getElementById('counter').innerText = `BUREAUCRACY_EXPUNGED: ${zapCount}/30`;
                el.remove();
                active = active.filter(i => i !== obj);

                if(zapCount < 30) {
                    // THE BLAST PHYSICS: Hitting one shatters into SIX more
                    for(let i=0; i<6; i++) spawn(obj.x, obj.y, true);
                } else {
                    goDark();
                }
            };
            active.push(obj);
        }

        // START: 2 words only
        spawn(); spawn();

        function update() {
            if(!ritualComplete) {
                active.forEach(o => {
                    o.x += o.dx; o.y += o.dy;
                    if(o.x < -20) o.x = 120; if(o.x > 120) o.x = -20;
                    if(o.y < -20) o.y = 120; if(o.y > 120) o.y = -20;
                    o.el.style.left = o.x + 'vw'; o.el.style.top = o.y + 'vh';
                });
            }
            requestAnimationFrame(update);
        }
        update();

        function goDark() {
            ritualComplete = true;
            document.getElementById('counter').style.display = 'none';
            
            // SUCK INTO BLACK HOLE
            active.forEach(o => {
                o.el.style.transition = "all 0.8s ease-in";
                o.el.style.left = "50vw"; o.el.style.top = "50vh";
                o.el.style.transform = "scale(0)";
            });

            // 3 SECONDS OF TOTAL VOID
            setTimeout(() => {
                active.forEach(o => o.el.remove());
                
                // THE BAM: White Streaks Explosion
                for(let i=0; i<80; i++) {
                    const s = document.createElement('div');
                    s.className = 'streak';
                    s.style.left = '50vw'; s.style.top = '50vh';
                    const angle = Math.random() * 360;
                    s.style.transform = `rotate(${angle}deg) translateY(0)`;
                    document.body.appendChild(s);
                    s.animate([
                        { transform: `rotate(${angle}deg) translateY(0)`, opacity: 1 },
                        { transform: `rotate(${angle}deg) translateY(1000px)`, opacity: 0 }
                    ], { duration: 1000, easing: 'ease-out' });
                    setTimeout(() => s.remove(), 1000);
                }

                // REVEAL ORB
                const orb = document.getElementById('orb');
                orb.style.transform = 'translate(-50%, -50%) scale(1)';
                setTimeout(() => { document.getElementById('zodiac-name').style.opacity = '1'; }, 1500);
            }, 3000);
        }
    </script>
</body>
</html>
