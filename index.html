 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        /* 1. THE UNIVERSE - Deep, Bright, & Moving */
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0d0d2b 0%, #000000 100%);
            z-index: 1;
        }

        .nebula {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0.6; /* Higher opacity for immediate universe visibility */
            background: 
                radial-gradient(circle at 30% 30%, rgba(100, 60, 255, 0.6), transparent 45%),
                radial-gradient(circle at 70% 70%, rgba(0, 180, 255, 0.5), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 20, 150, 0.4), transparent 55%);
            filter: blur(50px);
            animation: rotateNebula 120s linear infinite;
        }

        @keyframes rotateNebula {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 2. THE STAGE - Fixed Stacking and No-Wrap */
        .kinship-stage {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
            text-align: center;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(24px, 6vw, 42px); 
            text-transform: uppercase;
            letter-spacing: 0.35em;
            margin: 0;
            padding: 0;
            opacity: 0;
            white-space: nowrap; /* FORCES ONE LINE */
            display: block;
            animation: doubleBreathAndRise 9s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700; 
            font-size: clamp(14px, 2.5vw, 20px);
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin-top: 30px; 
            opacity: 0;
            display: block;
            animation: sharpAppearAndRise 9s ease-in-out forwards;
        }

        @keyframes doubleBreathAndRise {
            0% { opacity: 0; transform: scale(0.98); }
            15% { opacity: 1; text-shadow: 0 0 15px #FFD700; transform: scale(1); }
            30% { opacity: 0.05; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            65% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-300px); filter: blur(5px); }
        }

        @keyframes sharpAppearAndRise {
            0%, 38% { opacity: 0; transform: translateY(10px); }
            50% { opacity: 1; transform: translateY(0); }
            65% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-300px); }
        }

        /* 3. SOFT GLOW PILL BUTTON */
        .btn-container {
            opacity: 0;
            margin-top: 60px;
            pointer-events: auto;
            animation: revealButton 2s ease-out 8s forwards;
        }

        .enter-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.25);
            padding: 22px 80px;
            color: #ffffff;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            border-radius: 100px; /* Perfectly Soft Edges */
            cursor: pointer;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .enter-button:hover {
            border-color: #FFD700;
            color: #FFD700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
            background: rgba(255, 215, 0, 0.05);
        }

        @keyframes revealButton {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
