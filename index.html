 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinship - A Personal Ascent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        /* 1. BASE STARFIELD */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            z-index: 1;
        }

        .galaxy-bg::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 1px; height: 1px;
            background: transparent;
            box-shadow: 
                15vw 15vh 1px #fff, 35vw 45vh 2px #fff, 80vw 10vh 1px #fff,
                90vw 80vh 1px #fff, 12vw 75vh 2px #fff, 50vw 50vh 1px #fff,
                25vw 30vh 1px rgba(255,255,255,0.5), 75vw 65vh 1.5px rgba(255,255,255,0.8),
                40vw 12vh 1px #fff, 65vw 88vh 1px #fff, 8vw 52vh 2px #fff,
                20vw 80vh 1px #fff, 45vw 25vh 1px rgba(255,255,255,0.3),
                85vw 35vh 1px #fff, 95vw 5vh 2px #fff, 55vw 75vh 1px #fff;
            animation: twinkle 8s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }

        /* 2. THE UNIVERSE REVEAL (Nebula) */
        .universe-nebula {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            opacity: 0;
            /* Brighter, more vivid colors for a "Universe" feel */
            background: 
                radial-gradient(circle at 20% 30%, rgba(70, 30, 180, 0.4), transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(0, 100, 150, 0.3), transparent 60%),
                radial-gradient(circle at 50% 50%, rgba(150, 20, 80, 0.2), transparent 70%);
            animation: revealUniverse 3s ease-out 6.5s forwards;
        }

        @keyframes revealUniverse {
            to { opacity: 1; }
        }

        /* 3. THE TEXT STAGE */
        .kinship-stage {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .welcome-text {
            font-family: 'Georgia', serif;
            color: #ffffff;
            font-size: clamp(24px, 6vw, 42px); 
            text-transform: uppercase;
            letter-spacing: 0.35em;
            opacity: 0;
            position: absolute;
            /* Total duration reduced to 7s */
            animation: doubleBreathAndRise 7s ease-in-out forwards;
        }

        .ascent-text {
            font-family: 'Georgia', serif;
            color: #FFD700; 
            font-size: clamp(16px, 2.5vw, 22px);
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.5em;
            margin-top: 80px;
            opacity: 0;
            position: absolute;
            animation: sharpAppearAndRise 7s ease-in-out forwards;
        }

        @keyframes doubleBreathAndRise {
            0% { opacity: 0; transform: scale(0.95); }
            15% { opacity: 1; text-shadow: 0 0 15px #FFD700; transform: scale(1); }
            30% { opacity: 0.1; transform: scale(0.98); }
            45% { opacity: 1; text-shadow: 0 0 25px #FFD700; transform: scale(1); }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-250px); filter: blur(5px); letter-spacing: 0.6em; }
        }

        @keyframes sharpAppearAndRise {
            0%, 40% { opacity: 0; transform: translateY(10px); }
            55% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-300px); letter-spacing: 0.8em; }
        }

        /* 4. THE ENTER BUTTON */
        .enter-btn-wrapper {
            opacity: 0;
            z-index: 101;
            /* Appears right as the nebula finishes revealing */
            animation: revealButton 1.5s ease-out 8s forwards;
        }

        .enter-button {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 18px 56px;
            font-family: 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.5s ease;
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .enter-button:hover {
            border-color: #FFD700;
            color: #FFD700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
            transform: scale(1.05);
        }

        @keyframes revealButton {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="galaxy-bg"></div>
    <div class="universe-nebula"></div>

    <div class="kinship-stage">
        <h1 class="welcome-text">Welcome to Kinship</h1>
        <div class="ascent-text">A Personal Ascent</div>
        
        <div class="enter-btn-wrapper">
            <button class="enter-button" onclick="alert('Proceeding to Ascent...')">Enter</button>
        </div>
    </div>

</body>
</html>
